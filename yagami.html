<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#08060b">
<title>夜神月模拟器</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;500;700;900&family=Noto+Sans+SC:wght@300;400;500&display=swap');
:root{
  --void:#08060b; --ink:#120d18;
  --gold:#c9a84c;        /* 神性的金 */
  --blood:#a3231f; --blood-hot:#d64541;
  --bone:#e2dccf; --dim:#4a4258; --mist:#8b8398;
  --l-blue:#5b7f9e;      /* L 的冷蓝 */
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--void);overflow:hidden;}
body{color:var(--bone);font-family:'Noto Sans SC',sans-serif;font-weight:300;user-select:none;}
#app{position:relative;height:100dvh;max-width:900px;margin:0 auto;overflow:hidden;display:flex;flex-direction:column;}

/* ---------- 场景背景 ---------- */
#bg{position:absolute;inset:0;transition:background 1.4s ease;
  background:radial-gradient(ellipse 100% 70% at 50% 0%, #1a1226, var(--void) 70%);}
#app[data-bg="class"]  #bg{background:linear-gradient(180deg,#2a2438 0%,#181226 55%,var(--void));}
#app[data-bg="street"] #bg{background:linear-gradient(180deg,#1c1420 0%,#0e0a14 60%,var(--void));}
#app[data-bg="room"]   #bg{background:radial-gradient(ellipse 90% 60% at 50% 20%, #241a2e, var(--void) 75%);}
#app[data-bg="night"]  #bg{background:linear-gradient(180deg,#0a0e1e 0%,#0a0714 60%,var(--void));}
#app[data-bg="tv"]     #bg{background:radial-gradient(ellipse 70% 45% at 50% 35%, #2c1518, var(--void) 75%);}
#app[data-bg="hq"]     #bg{background:linear-gradient(180deg,#101a24 0%,#0a0e16 60%,var(--void));}
#app[data-bg="god"]    #bg{background:radial-gradient(ellipse 90% 70% at 50% 30%, #3a2c10, #150e04 75%);}
/* 窗格光影 */
#bg::after{content:'';position:absolute;inset:0;opacity:.25;
  background:repeating-linear-gradient(90deg, transparent 0 90px, rgba(255,255,255,.015) 90px 92px);}

/* ---------- 立绘 ---------- */
#chara{position:absolute;left:50%;bottom:24dvh;transform:translateX(-50%) translateY(14px);
  height:66dvh;max-height:640px;pointer-events:none;
  opacity:0;transition:opacity .55s ease, transform .55s ease, filter .5s;
  display:flex;align-items:flex-end;justify-content:center;}
#chara.on{opacity:1;transform:translateX(-50%) translateY(0);}
#chara img{height:100%;width:auto;object-fit:contain;
  filter:drop-shadow(0 6px 30px rgba(0,0,0,.7));}
/* 说话时点亮，非说话时压暗——galgame 惯例 */
#chara.gold img{filter:drop-shadow(0 0 26px rgba(201,168,76,.35)) drop-shadow(0 6px 20px rgba(0,0,0,.7));}
#chara.blue img{filter:drop-shadow(0 0 26px rgba(91,127,158,.4)) drop-shadow(0 6px 20px rgba(0,0,0,.7));}
#chara.red img{filter:drop-shadow(0 0 30px rgba(214,69,65,.4)) drop-shadow(0 6px 20px rgba(0,0,0,.7));}
#chara.dim img{filter:brightness(.5) drop-shadow(0 6px 20px rgba(0,0,0,.7));}

/* ---------- 顶部状态 ---------- */
#hud{position:relative;z-index:5;display:flex;justify-content:space-between;align-items:center;
  padding:calc(10px + env(safe-area-inset-top)) 18px 8px;}
#day{font-family:'Noto Serif SC',serif;font-weight:700;letter-spacing:.3em;font-size:14px;color:var(--gold);}
#stats{display:flex;gap:14px;}
.stat{font-size:10px;letter-spacing:.15em;color:var(--mist);text-align:right;}
.stat b{display:block;font-family:'Noto Serif SC',serif;font-size:13px;font-weight:500;letter-spacing:.1em;margin-top:2px;}
#sSus b{color:var(--l-blue);} #sSup b{color:var(--blood-hot);} #sHeart b{color:var(--bone);}

/* ---------- 对话框 ---------- */
#dlg{position:relative;z-index:6;margin-top:auto;
  background:linear-gradient(180deg, rgba(10,7,14,.4), rgba(8,6,11,.96) 30%);
  padding:14px 22px calc(16px + env(safe-area-inset-bottom));
  min-height:34dvh;display:flex;flex-direction:column;}
#speaker{font-family:'Noto Serif SC',serif;font-weight:700;font-size:15px;letter-spacing:.25em;
  color:var(--gold);margin-bottom:8px;min-height:22px;}
#speaker.l{color:var(--l-blue);} #speaker.ryuk{color:var(--blood-hot);} #speaker.sys{color:var(--mist);}
#text{font-size:15.5px;line-height:2.05;color:#cfc9bc;white-space:pre-wrap;flex:1;}
#text .em{color:var(--gold);} #text .bad{color:var(--blood-hot);} #text .l{color:var(--l-blue);}
#next{align-self:flex-end;font-size:12px;color:var(--dim);letter-spacing:.3em;animation:blink 1.6s infinite;margin-top:6px;}
@keyframes blink{0%,100%{opacity:.2}50%{opacity:.9}}
#choices{display:flex;flex-direction:column;gap:9px;padding-top:10px;}
.ch{appearance:none;border:1px solid #2a2336;background:rgba(18,13,24,.9);color:var(--bone);
  font-family:'Noto Sans SC',sans-serif;font-weight:300;font-size:14.5px;letter-spacing:.1em;
  text-align:left;padding:13px 16px;border-radius:2px;cursor:pointer;transition:border-color .2s;}
.ch:active{border-color:var(--gold);background:rgba(38,30,20,.9);}
.ch.dark{border-color:#3a1512;} .ch.dark:active{border-color:var(--blood-hot);}
.ch small{display:block;font-size:11px;color:var(--dim);margin-top:3px;letter-spacing:.15em;}

/* ---------- 效果 ---------- */
#flash{position:fixed;inset:0;z-index:40;background:#fff;opacity:0;pointer-events:none;transition:opacity .12s;}
#redveil{position:fixed;inset:0;z-index:39;pointer-events:none;opacity:0;transition:opacity 1.2s;
  background:radial-gradient(ellipse 80% 70% at 50% 50%, transparent 40%, rgba(120,10,10,.35));}
body.writing #redveil{opacity:1;}
#deathnote{position:fixed;inset:0;z-index:45;display:none;align-items:center;justify-content:center;
  background:rgba(4,3,6,.92);flex-direction:column;gap:26px;}
#deathnote.on{display:flex;}
#dn-page{width:min(84vw,420px);background:#0d0b10;border:1px solid #2a2336;padding:30px 26px;position:relative;}
#dn-page::before{content:'DEATH NOTE';position:absolute;top:10px;left:0;right:0;text-align:center;
  font-size:10px;letter-spacing:.6em;color:#3a3346;}
#dn-name{font-family:'Noto Serif SC',serif;font-size:30px;font-weight:700;letter-spacing:.2em;color:var(--bone);
  text-align:center;margin-top:20px;min-height:46px;border-bottom:1px solid #2a2336;padding-bottom:12px;}
#dn-name.write{animation:inkin 1.6s steps(12) forwards;}
@keyframes inkin{from{clip-path:inset(0 100% 0 0);}to{clip-path:inset(0 0 0 0);}}
#dn-sub{text-align:center;font-size:12px;letter-spacing:.3em;color:var(--dim);margin-top:14px;}

/* ---------- 标题/结局 ---------- */
.screen{position:fixed;inset:0;z-index:60;display:none;flex-direction:column;align-items:center;justify-content:center;
  background:var(--void);padding:32px;text-align:center;}
.screen.on{display:flex;}
.screen h1{font-family:'Noto Serif SC',serif;font-weight:900;font-size:42px;letter-spacing:.28em;color:var(--bone);line-height:1.5;}
.screen h1 .g{color:var(--gold);} .screen h1 .r{color:var(--blood-hot);}
.screen .sub{margin-top:16px;font-size:12px;letter-spacing:.35em;color:var(--dim);line-height:2.2;}
.screen .story{margin-top:24px;max-width:440px;font-size:14px;line-height:2.3;color:#a8a295;text-align:left;white-space:pre-wrap;}
.screen .btn{margin-top:36px;appearance:none;border:1px solid var(--dim);background:transparent;color:var(--bone);
  font-family:'Noto Serif SC',serif;font-size:15px;letter-spacing:.5em;padding:13px 30px 13px 36px;cursor:pointer;border-radius:2px;}
.screen .btn:active{border-color:var(--gold);color:var(--gold);}
.btnrow{display:flex;gap:12px;margin-top:36px;flex-wrap:wrap;justify-content:center;}
.btnrow .btn{margin-top:0;}
#endTitle .endtag{margin-top:10px;font-size:12px;letter-spacing:.4em;color:var(--blood);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
</style>
</head>
<body>
<div id="app" data-bg="class">
  <div id="bg"></div>
  <div id="chara"><img id="charaImg" alt="" src=""></div>

  <div id="hud">
    <div id="day">第 1 天</div>
    <div id="stats">
      <div class="stat" id="sSus">L的怀疑<b>0%</b></div>
      <div class="stat" id="sSup">基拉支持率<b>0%</b></div>
      <div class="stat" id="sHeart">理性<b>100</b></div>
    </div>
  </div>

  <div id="dlg">
    <div id="speaker"></div>
    <div id="text"></div>
    <div id="next">▼ 点击继续</div>
    <div id="choices"></div>
  </div>
</div>

<div id="flash"></div><div id="redveil"></div>
<div id="deathnote"><div id="dn-page"><div id="dn-name"></div><div id="dn-sub">心脏麻痹 · 40秒后</div></div></div>

<div class="screen on" id="titleScreen">
  <h1>夜神月<br><span class="g">模拟器</span></h1>
  <div class="sub">第一章 · 拾获<br>粉丝同人作品 · 仅供个人娱乐</div>
  <div class="story">2003年，深秋。
你是夜神月——全国模拟考第一，警察厅刑事局局长的儿子，
一个对这个腐烂的世界感到无可救药地厌倦的高中生。

直到那个下午，
一本黑色的笔记本，从天而降。

「名字被写上的人类，将会死亡。」</div>
  <div class="btnrow">
    <button class="btn" id="startBtn">拾 起 笔 记</button>
    <button class="btn" id="loadBtn" style="display:none">读 取 存 档</button>
  </div>
</div>

<div class="screen" id="endTitle">
  <h1 id="endName"></h1><div class="endtag" id="endTag"></div>
  <div class="story" id="endStory"></div>
  <div class="btnrow">
    <button class="btn" onclick="location.reload()">回 到 标 题</button>
  </div>
</div>

<script>
/* ================= BGM ================= */
const BGMS={menu:'assets/bgm/the_twelve_o_clock_toll.mp3',write:'assets/bgm/the_measured_fall.mp3',l:'assets/bgm/the_final_deduction.mp3'};
const bgmEl={};let curBgm=null;
function bgm(key){
  if(key===curBgm)return;
  const prev=curBgm?bgmEl[curBgm]:null;curBgm=key;
  if(!bgmEl[key]){const a=new Audio(BGMS[key]);a.loop=true;a.volume=0;a.preload='auto';bgmEl[key]=a;}
  const nxt=bgmEl[key];nxt.play().catch(()=>{});
  const iv=setInterval(()=>{let done=true;
    if(prev&&prev!==nxt){prev.volume=Math.max(0,prev.volume-0.06);if(prev.volume>0.01)done=false;else prev.pause();}
    nxt.volume=Math.min(0.55,nxt.volume+0.05);if(nxt.volume<0.54)done=false;
    if(done)clearInterval(iv);},90);
}
/* ================= 引擎 ================= */
const $=id=>document.getElementById(id);
const S={day:1,sus:0,sup:0,heart:100,node:'d1_1',flags:{},chapter:1};
function clamp(v){return Math.max(0,Math.min(100,v));}
function setStats(d){ if(d.sus)S.sus=clamp(S.sus+d.sus); if(d.sup)S.sup=clamp(S.sup+d.sup); if(d.heart)S.heart=clamp(S.heart+d.heart);
  $('sSus').querySelector('b').textContent=S.sus+'%';
  $('sSup').querySelector('b').textContent=S.sup+'%';
  $('sHeart').querySelector('b').textContent=S.heart;
  if(S.sus>=100){go('end_caught');return true;}
  if(S.heart<=0){go('end_broken');return true;}
  return false;}
function setDay(n){S.day=n;$('day').textContent='第 '+n+' 天';}
const CHARA={light:{src:'assets/chara/light.webp',tone:'gold'},L:{src:'assets/chara/l.webp',tone:'blue'},ryuk:{src:'assets/chara/ryuk.webp',tone:'red'}};
let charaKey=null;
function setChara(who){
  const c=$('chara'),img=$('charaImg');
  if(!who){c.className='';charaKey=null;return;}
  const def=CHARA[who];if(!def){c.className='';return;}
  if(charaKey!==who){img.src=def.src;charaKey=who;}
  c.className='on '+def.tone;
}
function save(){localStorage.setItem('yagami_save',JSON.stringify(S));}
function loadSave(){try{const d=JSON.parse(localStorage.getItem('yagami_save'));if(d){Object.assign(S,d);return true;}}catch(e){}return false;}

let queue=[],qi=0,typing=null,busy=false,curNode=null;
function go(id){
  const n=STORY[id];
  if(!n){console.error('missing node',id);return;}
  curNode=id;S.node=id;save();
  if(n.day)setDay(n.day);
  if(n.bg)$('app').dataset.bg=n.bg;
  if(n.chara!==undefined)setChara(n.chara);
  if(n.stats){if(setStats(n.stats))return;}
  if(n.end){showEnd(n.end);return;}
  if(n.write){bgm('write');writeName(n.write,()=>{if(n.bgm)bgm(n.bgm);queue=n.t.slice();qi=0;nextLine(n);});return;}
  if(n.bgm)bgm(n.bgm);
  queue=n.t.slice();qi=0;nextLine(n);
}
function nextLine(n){
  if(qi<queue.length){
    const line=queue[qi++];
    showLine(line.s,line.x);
  }else{
    if(n.choices){showChoices(n.choices);}
    else if(n.next){go(n.next);}
  }
}
function showLine(sp,html){
  busy=true;
  const spEl=$('speaker');
  spEl.textContent=sp||'';
  spEl.className=sp==='L'?'l':(sp==='琉克'?'ryuk':(sp===''||sp==='——'?'sys':''));
  // 立绘明暗跟随说话人
  const c=$('chara');
  if(charaKey){
    const talking=(charaKey==='L'&&sp==='L')||(charaKey==='ryuk'&&sp==='琉克')||(charaKey==='light'&&(sp==='夜神月'||sp===''));
    const tone=CHARA[charaKey].tone;
    c.className='on '+(talking?tone:'dim');
  }
  $('choices').innerHTML='';$('next').style.display='none';
  const el=$('text');clearInterval(typing);el.innerHTML='';
  const tmp=document.createElement('div');tmp.innerHTML=html;const plain=tmp.textContent;let i=0;
  typing=setInterval(()=>{i+=2;el.textContent=plain.slice(0,i);
    if(i>=plain.length){clearInterval(typing);typing=null;el.innerHTML=html;busy=false;$('next').style.display='block';}},17);
}
$('dlg').addEventListener('click',e=>{
  if(e.target.closest('.ch'))return;
  if(typing){clearInterval(typing);typing=null;const n=STORY[curNode];const line=queue[qi-1];$('text').innerHTML=line.x;busy=false;$('next').style.display='block';return;}
  if(!busy&&$('choices').children.length===0)nextLine(STORY[curNode]);
});
function showChoices(list){
  $('next').style.display='none';
  const box=$('choices');box.innerHTML='';
  list.forEach(c=>{ if(c.cond&&!c.cond(S))return;
    const b=document.createElement('button');b.className='ch'+(c.dark?' dark':'');
    b.innerHTML=c.label+(c.hint?'<small>'+c.hint+'</small>':'');
    b.onclick=()=>{ if(c.stats){if(setStats(c.stats))return;} if(c.flag)S.flags[c.flag]=true; go(c.next); };
    box.appendChild(b);});
}
function writeName(name,then){
  document.body.classList.add('writing');
  const dn=$('deathnote');dn.classList.add('on');
  const nm=$('dn-name');nm.textContent=name;nm.classList.remove('write');void nm.offsetWidth;nm.classList.add('write');
  setTimeout(()=>{$('flash').style.opacity=.9;setTimeout(()=>$('flash').style.opacity=0,130);},1700);
  setTimeout(()=>{dn.classList.remove('on');document.body.classList.remove('writing');then();},2600);
}
function showEnd(key){
  const e=ENDS[key];localStorage.removeItem('yagami_save');
  $('endName').innerHTML=e.name;$('endTag').textContent=e.tag;$('endStory').textContent=e.story;
  $('endTitle').classList.add('on');
}

/* ================= 第一章剧情 =================
   节点格式：{ bg, day, chara:'gold|blue|red|gray|', stats:{sus,sup,heart},
              t:[{s:'说话人',x:'文本'}...], choices:[...] | next:'id' | end:'key' | write:'名字' }
   ——以后加章节：直接往 STORY 里追加节点即可 —— */
const STORY={
d1_1:{bg:'class',day:1,chara:'',bgm:'menu',t:[
 {s:'',x:'第六节课。窗外的天灰得像一张脏抹布。'},
 {s:'',x:'英语老师在讲台上念着十年没换过的教案。你在笔记本上写完了明天模拟考的全部要点——十分钟之前。'},
 {s:'夜神月',x:'（无聊。）\n（这个世界，每一天都在重复同样的腐烂。）'},
 {s:'',x:'就在你把视线移回窗外的那一瞬——\n<span class="em">有什么黑色的东西，从天上掉了下去。</span>'},
],choices:[
 {label:'放学后去看看',hint:'不过是好奇而已',next:'d1_2'},
 {label:'无视它',hint:'大概是谁扔的垃圾',next:'d1_ignore'},
]},
d1_ignore:{bg:'class',t:[
 {s:'夜神月',x:'（……与我无关。）'},
 {s:'',x:'你收回视线。可那一整节课，那个黑色的影子都在你的脑海里坠落。\n一遍，又一遍。'},
 {s:'',x:'放学铃响的时候，你的脚已经先于你的决定，走向了操场。'},
],next:'d1_2'},
d1_2:{bg:'street',chara:'',t:[
 {s:'',x:'操场角落的草地上，躺着一本黑色的笔记本。\n封面上印着两个英文单词：\n<span class="em">DEATH NOTE。</span>'},
 {s:'夜神月',x:'（死亡笔记？……恶趣味的恶作剧。）'},
 {s:'',x:'你翻开第一页。内页的英文写着使用规则：'},
 {s:'',x:'<span class="bad">「名字被写在这本笔记上的人类，将会死亡。」\n「书写者必须在脑中浮现对方的长相。」\n「若不指定死因，一律为心脏麻痹。」</span>'},
],choices:[
 {label:'带回家',hint:'……写得这么认真的恶作剧，倒是少见',next:'d1_3',stats:{heart:-2}},
 {label:'扔回原地',hint:'幼稚',next:'d1_throw'},
]},
d1_throw:{bg:'street',t:[
 {s:'',x:'你把笔记本丢回草地，拍了拍手上的灰。'},
 {s:'',x:'走出十几米，你停下了。'},
 {s:'夜神月',x:'（……如果，万一，那上面写的是真的呢？）\n（这样的东西落在别人手里——）'},
 {s:'',x:'五分钟后，笔记本躺在了你的书包最底层。\n你告诉自己，这是为了「保管」。'},
],next:'d1_3'},
d1_3:{bg:'room',day:1,bgm:'write',chara:'',t:[
 {s:'',x:'晚上十点。房间里只有台灯亮着。\n笔记本摊开在书桌上，第一页雪白。'},
 {s:'夜神月',x:'（试一下就知道了。写谁？）\n（当然……不能是无辜的人。万一是真的。）'},
 {s:'',x:'电视里正在播新闻：新宿一起劫持人质事件，嫌犯挟持了幼儿园的孩子，警方束手无策。\n嫌犯的名字和脸，占满了整个屏幕。'},
],choices:[
 {label:'写下那个名字',hint:'如果是假的，什么都不会发生',next:'d1_write',dark:true},
 {label:'合上笔记本',hint:'荒唐。我在做什么？',next:'d1_hesitate'},
]},
d1_hesitate:{bg:'room',t:[
 {s:'',x:'你合上了笔记本。\n可电视里传来主播的声音：「嫌犯情绪激动，已开始伤害人质——」'},
 {s:'夜神月',x:'（如果那些孩子死了……而我本来有可能阻止——）'},
 {s:'',x:'笔，已经在你的手里了。'},
],next:'d1_write'},
d1_write:{bg:'tv',write:'涩井丸拓男',t:[
 {s:'',x:'四十秒后。\n电视画面剧烈晃动——「嫌犯……嫌犯倒下了！人质正在逃出！重复，人质全部安全——」'},
 {s:'夜神月',x:'（心脏麻痹。恰好，四十秒。）\n（巧合。一定是巧合——）'},
 {s:'',x:'你的手在抖。\n但在颤抖的最深处，有一个声音在低语：\n<span class="em">再试一次，就能确定了。</span>'},
],choices:[
 {label:'再写一个',hint:'确认，需要两次',next:'d2_1',dark:true,stats:{heart:-6,sup:2}},
 {label:'今晚到此为止',hint:'我需要冷静',next:'d2_1_calm',stats:{heart:-2}},
]},
d2_1_calm:{bg:'room',day:2,t:[
 {s:'',x:'那一夜你几乎没睡。第二天，你在放学路上「顺便」路过了一起飞车抢劫的现场直播。'},
 {s:'',x:'第二个名字，是在便利店门口写下的。\n那个人在骑车逃逸的路上，撞上了电线杆。'},
 {s:'夜神月',x:'（……不是巧合。）'},
],next:'d2_2'},
d2_1:{bg:'room',day:2,t:[
 {s:'',x:'第二个名字，你选了一个正在电视上被通缉的连环杀人犯。\n第二天早上，新闻报道了他在拘留所里心脏麻痹。'},
 {s:'夜神月',x:'（……不是巧合。）'},
],next:'d2_2'},
d2_2:{bg:'room',chara:'ryuk',t:[
 {s:'',x:'第五天的深夜。你正在笔记上书写今天的第六个名字——'},
 {s:'？？？',x:'「很勤奋嘛，人类。」'},
 {s:'',x:'你猛地回头。\n窗边立着一个<span class="bad">两米多高的怪物</span>：皮肤灰黑，眼球突出，咧到耳根的嘴上挂着愉快的笑。'},
 {s:'琉克',x:'「别紧张。我是死神，琉克。那本笔记原本是我的——不过掉到人间的东西，归捡到的人。」'},
 {s:'琉克',x:'「我不站在你这边，也不站在追捕你的人那边。我只是……来看好戏的。」'},
 {s:'夜神月',x:'（死神……原来如此，这份力量是真的。彻彻底底，是真的。）'},
],choices:[
 {label:'「正好。我有很多问题要问你。」',hint:'冷静地接受，然后利用',next:'d5_vision',stats:{heart:-4}},
 {label:'「……你要收回它吗？」',hint:'试探底线',next:'d5_vision2'},
]},
d5_vision2:{bg:'room',chara:'ryuk',t:[
 {s:'琉克',x:'「收回？哈，为什么？放弃所有权可以，不过那样的话——关于笔记的记忆会全部消失哦。」'},
 {s:'夜神月',x:'（消失……也就是说，现在的我，已经回不去了。）\n（那么，就只剩一条路了。）'},
],next:'d5_vision'},
d5_vision:{bg:'god',chara:'light',bgm:'menu',t:[
 {s:'夜神月',x:'「琉克，你来得正好。我已经决定了。」'},
 {s:'夜神月',x:'「我要用这本笔记，<span class="em">清扫这个世界的腐烂</span>。罪犯会一个接一个地消失，人们会意识到——恶行必有报应。」'},
 {s:'夜神月',x:'「犯罪会灭绝。而到那时，剩下的这个善良的新世界里……」'},
 {s:'夜神月',x:'「<span class="em">我，就是神。</span>」'},
 {s:'琉克',x:'「……哈。果然，人类什么的，最有意思了。」'},
],next:'d12_1'},
d12_1:{bg:'tv',day:12,chara:'',t:[
 {s:'',x:'十二天。五十二个名字。\n世界开始注意到了：重刑犯接二连三的心脏麻痹，不是天灾。'},
 {s:'',x:'网络上，有人给这个看不见的裁决者起了名字——\n<span class="bad">KIRA（基拉）。</span>'},
 {s:'',x:'支持与恐惧同时在蔓延。而在国际刑警组织的紧急会议上，一个从不露面的男人接下了这个案子。\n代号——<span class="l">L</span>。'},
],next:'d12_2',stats:{sup:14,sus:0}},
d12_2:{bg:'tv',bgm:'l',chara:'L',t:[
 {s:'',x:'傍晚。全频道突然切换成同一个画面：一个坐在桌前的男人，桌牌上写着「린드·L·泰罗」。'},
 {s:'林德·L·泰罗',x:'「我是L。基拉——你所做的事，是史上最恶劣的连续杀人。我一定会抓到你。」'},
 {s:'夜神月',x:'（L……终于出来了吗。正面向我挑战？愚蠢。）'},
],choices:[
 {label:'当场写下他的名字',hint:'敢报上名字挑衅神，就受死吧',next:'d12_trap',dark:true,stats:{heart:-5}},
 {label:'按兵不动',hint:'太顺利了。直播里报全名？可疑',next:'d12_wait'},
]},
d12_trap:{bg:'tv',bgm:'l',write:'林德·L·泰罗',t:[
 {s:'',x:'四十秒后，屏幕里的男人捂住胸口，倒了下去。\n你的嘴角刚刚扬起——'},
 {s:'',x:'画面切换。一个哥特花体的<span class="l">「L」</span>占据了整个屏幕。'},
 {s:'L',x:'「……难以置信。真的做到了。刚才那位，是今日本该处刑的死刑犯。<span class="l">我才是L。</span>」'},
 {s:'L',x:'「而且，谢谢你。你证明了两件事：你可以在不接触对方的情况下杀人——以及，这段节目只在<span class="l">关东地区</span>试播。」'},
 {s:'L',x:'「基拉，你在关东。我们，很快会见面的。」'},
 {s:'夜神月',x:'（——被摆了一道！！）'},
],next:'d12_after',stats:{sus:18,heart:-4}},
d12_wait:{bg:'tv',bgm:'l',t:[
 {s:'',x:'你盯着屏幕，没有动笔。\n一小时后，那档「全国直播」悄无声息地结束了。'},
 {s:'',x:'第二天你查到：那个「林德·L·泰罗」是个替身，而节目只在关东试播——那是一个为你量身定做的陷阱。'},
 {s:'夜神月',x:'（差一点。差一点就把「我在关东」亲手送给他了。）\n（L……你是第一个值得我认真对待的对手。）'},
 {s:'L',x:'（同一时刻，某个房间里）「……没有上钩吗。谨慎、聪明、自负。基拉的画像，越来越清晰了。」'},
],next:'d12_after',stats:{sus:6,heart:2}},
d12_after:{bg:'night',day:14,bgm:'l',chara:'ryuk',t:[
 {s:'',x:'战争开始了。\n看不见的两个人，隔着整个城市对弈。'},
 {s:'',x:'而你注意到：这几天，回家的路上，似乎总有同一双眼睛。\n<span class="l">警方开始调查基拉相关人员的家属了——包括警察厅长官的家人。</span>'},
 {s:'琉克',x:'「呐，月。有个东西……我一直没告诉你。」'},
 {s:'琉克',x:'「<span class="bad">死神之眼</span>。只要付出你剩余寿命的一半，你就能看见任何人的名字和寿命。要交易吗？」'},
],choices:[
 {label:'「不需要。」',hint:'我的寿命属于新世界，一秒都不给你',next:'d14_refuse'},
 {label:'「……条件呢？再详细说说」',hint:'情报要先收集，交不交易另说',next:'d14_ask'},
 {label:'成交',hint:'名字即是力量',next:'end_eyes',dark:true},
]},
d14_ask:{bg:'night',chara:'ryuk',t:[
 {s:'琉克',x:'「哦？不像你会问的话。条件很简单：寿命的一半。现在就能换。」'},
 {s:'夜神月',x:'「那我拒绝。用一半的『神的寿命』去换一个便利功能？琉克，你把我看得太廉价了。」'},
 {s:'琉克',x:'「咔咔……我就知道你会这么说。」'},
],next:'ch1_end'},
d14_refuse:{bg:'night',chara:'light',t:[
 {s:'夜神月',x:'「不需要。我要活着看到新世界的黎明——一秒都不会分给你。」'},
 {s:'夜神月',x:'「名字，我会用<span class="em">头脑</span>拿到。」'},
 {s:'琉克',x:'「……人类，真是有意思啊。」'},
],next:'ch1_end'},
ch1_end:{bg:'god',chara:'light',bgm:'menu',t:[
 {s:'',x:'—— 第一章 · 拾获　完 ——'},
 {s:'',x:'L 已经锁定：基拉在关东，是个能拿到警方内部情报、心智极高的人。\n为了缩小范围，他动用了最后的底牌——'},
 {s:'',x:'<span class="l">十二名 FBI 探员，秘密入境日本。\n他们将逐一排查每一个与调查有关的警察及其家属。</span>'},
 {s:'琉克',x:'「呐，月。看样子……有人开始跟着你了哦。」'},
],choices:[
 {label:'进入第二章 · 尾行者',next:'c2_1'},
]},

/* ═══════════════════════════════════════════════
   第二章《尾行者》—— 雷·潘伯的十二天
   继承第一章数值（sus/sup/heart）
   ═══════════════════════════════════════════════ */
c2_1:{bg:'street',day:15,chara:'',bgm:'l',t:[
 {s:'',x:'第二章 · 尾行者'},
 {s:'',x:'放学路上。人群、车流、便利店的灯。一切如常。'},
 {s:'夜神月',x:'（……但从三天前开始，有一双眼睛。）\n（无论我走哪条路，那个穿灰色西装的男人，总在我视线的边缘。)'},
 {s:'琉克',x:'「要我告诉你他的名字吗？只要交易死神之眼——」'},
 {s:'夜神月',x:'（不必。我说过，名字我用头脑拿。）\n（首先，确认他到底是不是在跟踪我。）'},
],choices:[
 {label:'故意绕进死胡同，观察他反应',hint:'确认尾行',next:'c2_confirm',stats:{heart:-1}},
 {label:'装作没发现，先回家',hint:'打草惊蛇不智',next:'c2_home'},
]},
c2_home:{bg:'room',chara:'',t:[
 {s:'',x:'你不动声色地回了家。当晚，你从父亲的公文包里，看到了一份文件的边角——「协助调查方：F.B.I.」。'},
 {s:'夜神月',x:'（FBI……美国派人来了。那个尾行者，是探员。）\n（L 在排查警察家属。而我，正是长官的儿子。）'},
 {s:'夜神月',x:'（他们在等我露出马脚。那么——我偏要利用这次被监视，反将一军。）'},
],next:'c2_plan'},
c2_confirm:{bg:'street',chara:'',t:[
 {s:'',x:'你拐进一条死胡同，数到三，猛地回头。\n那个灰西装男人正好也停在巷口，假装看手机——但你们的目光，撞了个正着。'},
 {s:'夜神月',x:'（果然。职业的尾行，反应太快了。普通人不会这样。）\n（FBI……在排查警察家属。我是长官的儿子，当然在名单里。）'},
 {s:'琉克',x:'「被盯上了呢，怎么办？」'},
 {s:'夜神月',x:'（怎么办？当然是——把这次监视，变成我的武器。）'},
],next:'c2_plan'},
c2_plan:{bg:'room',day:16,chara:'light',bgm:'menu',t:[
 {s:'夜神月',x:'（问题的核心：我不知道跟踪我的探员叫什么名字，也不知道一共有几个人。）'},
 {s:'夜神月',x:'（如果能拿到<span class="em">全部探员的名单</span>，就能用笔记一次清除，让 L 在日本的眼睛全部失明。）'},
 {s:'夜神月',x:'（但怎么让一个训练有素的 FBI，自己交出名字？……我需要一个局。）'},
 {s:'琉克',x:'「嘿嘿，又开始了。你这种表情，最可怕了。」'},
],choices:[
 {label:'制造一起「劫持事件」，逼探员自报身份',hint:'经典的巴士计划',next:'c2_bus',dark:true},
 {label:'先给探员制造「我只是普通学生」的假象',hint:'松懈对方警惕',next:'c2_decoy'},
]},
c2_decoy:{bg:'street',chara:'',t:[
 {s:'',x:'接下来两天，你表演了一个完美的普通高中生：书店、汉堡店、和女生走在一起、在游戏厅消磨时间。'},
 {s:'夜神月',x:'（让他放松。让他在报告里写下"目标行为正常，疑似无关"。）\n（然后，在他最松懈的时候，收网。）'},
 {s:'',x:'第三天，你注意到跟踪的间距变大了。时机成熟了。'},
],next:'c2_bus'},
c2_bus:{bg:'street',day:18,chara:'',bgm:'l',t:[
 {s:'',x:'你上了一辆开往宇宙主题公园的巴士。灰西装探员，也若无其事地跟了上来，坐在后排。'},
 {s:'',x:'几站之后，一个神色慌张的男人突然拔枪站起——他劫持了巴士。\n（这个劫匪，是你用笔记提前操控、注定今天死亡的罪犯。一切都在计划内。）'},
 {s:'夜神月',x:'（现在，制造一个「我和探员是同伴」的假象，逼他亮出证件。）'},
],choices:[
 {label:'悄悄对探员说：「我们联手制服他」',hint:'诱导他表明FBI身份',next:'c2_reveal',dark:true},
 {label:'假装乘客，丢出一张纸条给他',hint:'纸条上写好剧本',next:'c2_reveal'},
]},
c2_reveal:{bg:'street',chara:'',bgm:'l',t:[
 {s:'',x:'探员权衡了一下，压低声音回应你，亮明了立场——他确实是执法人员。\n计划的第一步成功了：他上钩了。'},
 {s:'',x:'混乱中，你假意配合，实则套话。而那名劫匪，在跳车逃跑后，如"预定"的一样，心脏麻痹倒地。'},
 {s:'夜神月',x:'（劫匪已清除，痕迹干净。而这位探员，已经确认我"疑似同伙"或"知情者"。）'},
 {s:'夜神月',x:'（下一步，才是真正的杀招——让他把<span class="em">所有同事的名字</span>交给我。）'},
],next:'c2_ray'},
c2_ray:{bg:'night',day:19,chara:'ryuk',bgm:'l',t:[
 {s:'',x:'通过一系列缜密的伪装与操控，你终于让那名探员——<span class="l">雷·潘伯</span>——相信：为了他的任务与安全，他必须查明并记录下所有同期探员的行动。'},
 {s:'琉克',x:'「你真的……做到了。让 FBI 自己把名单送上门。」'},
 {s:'夜神月',x:'（十二个名字。全部。）\n（只要写下去，L 在日本的耳目，将在同一时刻，全部消失。）'},
 {s:'',x:'笔尖悬在笔记本上方。这是本章最重的一笔。'},
],choices:[
 {label:'写下全部十二名探员',hint:'一次性致盲L，但会引发轩然大波',next:'c2_massacre',dark:true},
 {label:'只写下雷·潘伯一人',hint:'谨慎，减少震动',next:'c2_single'},
 {label:'放弃，不能杀这么多执法者',hint:'守住最后的底线',next:'c2_mercy'},
]},
c2_massacre:{bg:'tv',chara:'',bgm:'write',write:'雷·潘伯　外十一名',t:[
 {s:'',x:'同一时刻，日本各地。\n十二名 FBI 探员，在电车里、在街头、在酒店房间，同时倒下。'},
 {s:'',x:'消息传回时，L 沉默了很久。'},
 {s:'L',x:'「……一次十二人。基拉，你不只是审判者。你是在向全世界宣告：挡我者，死。」'},
 {s:'L',x:'「但你也告诉了我一件事——你，就在被这些探员监视的人当中。<span class="l">包围圈，缩小了。</span>」'},
 {s:'夜神月',x:'（代价我清楚。但 L 的眼睛，暂时瞎了。）'},
],next:'c2_end',stats:{sus:20,sup:10,heart:-10}},
c2_single:{bg:'tv',chara:'',bgm:'write',write:'雷·潘伯',t:[
 {s:'',x:'只有雷·潘伯一人倒下。其余探员撤回了美国，调查暂时受挫。'},
 {s:'L',x:'「只死了一个……你在收敛？还是在示弱？不。你是在减少暴露。」'},
 {s:'L',x:'「越谨慎，越说明你惜命、你聪明、你就在附近。基拉，我更确信了。」'},
 {s:'夜神月',x:'（震动小了，但 L 反而嗅到了我的"谨慎"。这个男人……真难缠。）'},
],next:'c2_end',stats:{sus:10,sup:3,heart:-4}},
c2_mercy:{bg:'night',chara:'light',bgm:'menu',t:[
 {s:'夜神月',x:'（不。他们只是奉命行事的执法者。滥杀无辜的守序者，会玷污新世界的正义。）'},
 {s:'夜神月',x:'（我要清扫的是"恶"，不是"挡路的人"——如果连这个界限都守不住，我和普通的杀人狂有什么区别？）'},
 {s:'',x:'你合上了笔记本。探员撤回，你逃过一次收网，也守住了心里那条正在变细的线。'},
 {s:'琉克',x:'「……你偶尔，会让我看不懂啊，月。」'},
],next:'c2_end',stats:{sus:-4,sup:-2,heart:8}},
c2_end:{bg:'god',chara:'light',bgm:'menu',t:[
 {s:'',x:'—— 第二章 · 尾行者　完 ——'},
 {s:'',x:'雷·潘伯的事件之后，L 决定亲自现身。命运的齿轮，本该按既定的轨迹转动。'},
 {s:'琉克',x:'「呐，月。今晚的苹果，你还没给我买。」'},
 {s:'夜神月',x:'（……什么？）'},
 {s:'琉克',x:'「说好的。写名字那么大的事你都干了，一个苹果不至于赖账吧？死神也是要吃饭的。」'},
 {s:'',x:'——就是这个微不足道的、荒诞的瞬间。\n历史，在这里分叉了。'},
],choices:[
 {label:'「……行，我去给你买。」',hint:'谁能想到，一切从这颗苹果开始崩坏',next:'br_apple_1'},
 {label:'「闭嘴，我在下一盘大棋。」',hint:'继续与L的正面对决',next:'c3_1'},
]},

/* ═══════════════════════════════════════════════
   魔改支线①《苹果的代价》
   沙雕外壳 → 黑暗内核。原著绝无此线。
   ═══════════════════════════════════════════════ */
br_apple_1:{bg:'street',day:20,chara:'',bgm:'menu',t:[
 {s:'',x:'深夜的便利店。冷白的灯。你站在水果货架前，手里捏着一颗红苹果。'},
 {s:'夜神月',x:'（我，全国模考第一，新世界的神……在半夜给一只死神跑腿买苹果。）'},
 {s:'琉克',x:'「那颗不行，有个疤。旁边那颗，对，红一点的。」'},
 {s:'',x:'收银台后，是个眼熟的店员——你们高中隔壁班的同学，成绩垫底、以爱管闲事出名的<span class="em">吉田</span>。'},
 {s:'吉田',x:'「哟，夜神？这么晚买苹果？……诶，你刚才是不是在跟空气说话？」'},
],choices:[
 {label:'「……只是自言自语。」',hint:'搪塞过去',next:'br_apple_2'},
 {label:'「你看得见我旁边的东西？」',hint:'试探他是否碰过笔记',next:'br_apple_touch'},
]},
br_apple_touch:{bg:'street',chara:'',t:[
 {s:'吉田',x:'「你旁边？就……空气啊？夜神你没事吧，学习压力太大了？」'},
 {s:'夜神月',x:'（看不见琉克。那就是没碰过笔记。虚惊一场。）'},
 {s:'吉田',x:'「不过说真的，最近那个基拉，你怎么看？我觉得吧——能一个个弄死罪犯，这人肯定有啥超能力！说不定就在我们身边呢！」'},
 {s:'夜神月',x:'（……这个笨蛋，无意中说中了。）'},
],next:'br_apple_2'},
br_apple_2:{bg:'street',chara:'ryuk',t:[
 {s:'',x:'你付了钱，把苹果抛给琉克。他一口咬下，发出满足的怪笑。'},
 {s:'琉克',x:'「唔——好吃。人间的苹果，果然是最棒的。」'},
 {s:'',x:'就在你转身离开时，吉田在身后喊了一句：'},
 {s:'吉田',x:'「诶夜神！你那本黑笔记本掉了！」'},
 {s:'夜神月',x:'（——！！）'},
 {s:'',x:'你猛地回头。吉田正弯腰，从地上<span class="bad">捡起那本 DEATH NOTE</span>——它一定是刚才付钱时从你包里滑出来的。'},

 {s:'',x:'那个在你心里运筹帷幄、算计过 FBI、蔑视过 L 的"神"，在这一刻，只是一个被撞破秘密的十八岁少年。'},

br_apple_recruit:{bg:'room',day:21,chara:'',bgm:'menu',t:[
 {s:'夜神月',x:'「吉田。你说得对，基拉就是我。而你，刚刚获得了参与创造新世界的资格。」'},
 {s:'吉田',x:'「新、新世界？夜神你别吓我……我就一便利店打工的……」'},
 {s:'夜神月',x:'（这个笨蛋一无是处，但正因为一无是处，没人会怀疑他。他可以是我完美的白手套。）'},
 {s:'夜神月',x:'「你只需要做一件事：替我，保管一样东西，跑一些腿。就像……买苹果那样。」'},

br_yoshida_arc:{bg:'night',day:28,chara:'',bgm:'l',t:[
 {s:'',x:'一周过去了。吉田出乎意料地……好用。'},
 {s:'',x:'他替你取情报、望风、甚至学会了用一模一样的笔迹抄写名字。那个曾经善良、爱管闲事的笨蛋，在"参与神的事业"的虚荣里，一点点变了。'},
 {s:'吉田',x:'「夜神……今天这个贪污犯，我已经写好了。我写得对吗？我做得好吗？」'},
 {s:'夜神月',x:'（他不再问"这样对不对"，只问"我做得好不好"。）\n（正义感是最容易腐烂的东西。我只是……递了一把刀。）'},
 {s:'',x:'你看着吉田眼里那种谄媚的、渴望认可的光。\n忽然，一丝极淡的寒意，从你自己的脊背爬了上来。'},
 {s:'夜神月',x:'（我在创造一个新世界的神民。\n还是……在制造一个和我一样的怪物？）'},
],choices:[

br_yoshida_dark:{bg:'tv',chara:'ryuk',bgm:'write',t:[
 {s:'',x:'又一个月。吉田成了警方眼中最活跃的"基拉嫌疑人"——因为所有露在明面上的痕迹，都是他留下的。'},
 {s:'',x:'当 L 的包围圈收拢时，落网的，是那个在审讯室里痛哭流涕、大喊"我是基拉、我创造了新世界"的吉田。'},
 {s:'',x:'没有人相信一个便利店店员的胡言乱语能是真凶。但也没有人，再往下查了。'},
 {s:'夜神月',x:'（完美的替罪羊。他甚至是"自愿"的。）'},
 {s:'琉克',x:'「月……你连朋友都用得这么干净。你啊，早晚有一天，会把自己也算进这盘棋里的。」'},

br_yoshida_mercy:{bg:'room',chara:'light',bgm:'menu',t:[
 {s:'夜神月',x:'「吉田。这是最后一次。从明天起，你不认识我，也没见过任何笔记本。忘了这一切，回去当你的店员。」'},
 {s:'吉田',x:'「可是……新世界……我还想帮你……」'},
 {s:'夜神月',x:'「新世界不需要你搭上性命。走。」'},
 {s:'',x:'你看着他失魂落魄地离开。这一刻，你像是杀死了一个自己亲手创造的信徒，也像是……救了一个人。'},
 {s:'夜神月',x:'（连我自己都分不清，我这是仁慈，还是又一次精准的止损。）'},
 {s:'琉克',x:'「你偶尔会做些……不像神的事。这样的你，我倒是更看不透了。」'},
],next:'br_apple_end_light'},
br_apple_kill:{bg:'street',chara:'ryuk',bgm:'write',write:'吉田',t:[
 {s:'',x:'四十秒。吉田捂住胸口，那颗刚捡起笔记本的心脏，停止了跳动。他倒在便利店冰冷的地砖上，眼睛还睁着，望向你。'},
 {s:'',x:'你捡回笔记本，掸掉封面上的灰。周围一个人都没有。监控？你早已计算过角度。'},
 {s:'夜神月',x:'（一个无关的人。一个……只是好心提醒我"东西掉了"的人。）'},
 {s:'琉克',x:'「呐，月。他刚才，是想把笔记还给你哦。」'},
 {s:'',x:'你的手，停顿了半秒。\n然后，你把笔记本放回包里，转身离开。像什么都没发生过。'},
 {s:'夜神月',x:'（……是的。他想把它还给我。）\n（所以呢？神的道路上，容不下任何一颗石子。哪怕，是一颗好心的石子。）'},

 {s:'',x:'四月。东应大学入学典礼。\n作为新生代表，你站在礼堂的讲台上，念完了那篇完美无缺的致辞。掌声像潮水。'},
 {s:'夜神月',x:'（全国第一。理所当然。）\n（FBI 的事已经过去两个月，L 一定还在暗处盯着我。但他没有证据——永远不会有。）'},
 {s:'',x:'典礼结束后，一个弓着背、赤脚穿着帆布鞋的男生，端着咖啡走到你身边。\n他把方糖一颗、两颗、三颗……一直加到第七颗。'},

],next:'c3_2'},
c3_2:{bg:'street',day:35,chara:'L',bgm:'l',t:[
 {s:'',x:'他抬起头。黑眼圈很重的、毫无波澜的眼睛，直直地看着你。'},
 {s:'龙崎',x:'「我叫龙崎。和你一样，是今年的新生代表。」'},
 {s:'龙崎',x:'「有件事，我想只告诉你一个人。」'},
 {s:'',x:'他凑近了一点。周围的喧闹好像瞬间被抽空了。'},
 {s:'L',x:'「<span class="l">我，就是 L。</span>」'},
 {s:'夜神月',x:'（————）'},
 {s:'夜神月',x:'（他说什么？L？这个男人，就是 L？）\n（不。冷静。这是试探。他在观察我这一秒的表情、瞳孔、呼吸。）'},
 {s:'夜神月',x:'（任何一丝异常，都会成为他的证据。）'},
],choices:[

 {s:'L',x:'「……嗯。反应很自然。」'},
 {s:'L',x:'「不过夜神同学，你知道吗？听到这句话的人，通常有两种反应：\n第一种是笑，第二种是害怕。」'},

c3_counter:{bg:'street',chara:'L',bgm:'l',t:[

 {s:'L',x:'「因为我怀疑你是基拉。」'},
 {s:'夜神月',x:'「……哈？」'},

c3_confess:{bg:'street',chara:'L',bgm:'l',t:[
 {s:'',x:'时间，好像停了半秒。'},
 {s:'夜神月',x:'「……我就是基拉。」'},
 {s:'',x:'你说得很轻，轻到只有你们两个人能听见。周围的新生笑着走过，谁也没有回头。'},
 {s:'',x:'L 端着咖啡的手，停在半空。第七颗方糖，还捏在他指间。'},
 {s:'L',x:'「……」'},
 {s:'L',x:'「（把方糖放进杯子里）……夜神同学，你知道我此刻在想什么吗？」'},

],next:'c3_confess2'},
c3_confess2:{bg:'street',chara:'L',bgm:'l',t:[
 {s:'夜神月',x:'（赌博。但这是唯一能打乱他节奏的方式。）'},
 {s:'夜神月',x:'「我承认了。然后呢？逮捕我？你有证据吗，L？」'},
 {s:'夜神月',x:'「一个大学生在入学典礼后，对一个自称 L 的怪人说了句『我是基拉』——这在法庭上，连玩笑都算不上。」'},
 {s:'L',x:'「……确实。这段对话没有录音，没有证人。你甚至可以说是我幻听。」'},
 {s:'L',x:'「所以这不是自首。这是——<span class="l">挑衅</span>。」'},
 {s:'夜神月',x:'「随你怎么理解。」'},
 {s:'夜神月',x:'（我要的就是这个：让他知道，却什么都做不了。让「我知道你知道」这件事，成为压在他心上的石头。）'},
 {s:'夜神月',x:'（从这一刻起，我们不再是猎人与猎物。我们是——同一张牌桌上，摊开底牌的两个赌徒。）'},
],next:'c3_confess3',stats:{sus:25,heart:-6}},
c3_confess3:{bg:'hq',day:36,chara:'L',bgm:'l',t:[

 {s:'L',x:'「从今天起，我要和夜神月同学，<span class="l">住在一起</span>。」'},
 {s:'',x:'（搜查本部一片哗然。你的父亲当场站了起来。）'},
 {s:'夜神父',x:'「龙崎！你在说什么？月是我的儿子！」'},
 {s:'L',x:'「正因为如此。夜神局长，如果令郎清白，二十四小时的同居监视，是最快的洗清方式。」'},
 {s:'L',x:'「而如果他是基拉——」'},
 {s:'L',x:'「那我这条命，就交给他慢慢拿。」'},
 {s:'夜神月',x:'（这个疯子……）\n（他在用自己的性命，赌一场没有证据的游戏。）'},
],next:'c3_live'},
c3_live:{bg:'hq',day:50,chara:'L',bgm:'l',t:[

 {s:'',x:'你们一起吃饭、一起打网球、一起分析案情。你们像最好的朋友，也像最耐心的死敌。'},
 {s:'L',x:'（把草莓从蛋糕上叼下来）「夜神同学，你昨晚三点还醒着。」'},
 {s:'夜神月',x:'「你也是。」'},
 {s:'L',x:'「我在想，如果你是基拉，你现在最需要的是什么？」'},
 {s:'L',x:'「答案是：我的名字。你等了两周，还没有下手——说明你确实不知道。」'},
 {s:'L',x:'「这就是我敢和你同住的原因。你越是安分，越证明你是基拉。」'},
 {s:'夜神月',x:'（……这个逻辑闭环，简直无解。）\n（不管我做什么，在他眼里都是证据。）'},
],choices:[

 {s:'夜神月',x:'（L。真名不明。样貌已知。就住在这座城市里，和我上同一所大学。）'},
 {s:'夜神月',x:'（只要拿到名字，四十秒。只要四十秒。）'},
 {s:'夜神月',x:'（但他敢现身，就说明他早有准备。真名一定是最高机密。）'},
 {s:'琉克',x:'「死神之眼，随时都能交易哦。半条命，换所有人的名字。」'},
],choices:[
 {label:'「不需要。我说过，用头脑。」',hint:'坚持',next:'c3_shiori_intro',stats:{heart:2}},
 {label:'「……这次，我认真考虑一下。」',hint:'动摇了',next:'c3_eyes_temp',stats:{heart:-6}},
]},
c3_eyes_temp:{bg:'room',chara:'ryuk',t:[
 {s:'琉克',x:'「哦？终于动心了？」'},
 {s:'夜神月',x:'（……不。）\n（我的寿命，是新世界的资本。为了一个 L，赔上一半的统治时间？'},
 {s:'夜神月',x:'（不划算。而且，一旦我用眼睛杀了他，他背后的人会立刻知道基拉能"看见"名字——那才是真正的破绽。）'},
 {s:'夜神月',x:'「……算了。当我没说。」'},

/* ---------- 原创角色：诗织 ---------- */
c3_shiori_intro:{bg:'class',day:58,chara:'',bgm:'menu',t:[
 {s:'',x:'大学。刑法学的阶梯教室。'},
 {s:'',x:'你的邻座是个总把笔记本折得整整齐齐的女生——<span class="em">高城诗织</span>，法学部一年级，梦想是当检察官。'},
 {s:'诗织',x:'「夜神同学，这里的判例……你怎么看？」'},
 {s:'诗织',x:'「我觉得法律有时候好慢啊。等判决下来，受害者的家属都已经等了十年。」'},
 {s:'夜神月',x:'（……又一个对现行法律感到无力的人。）\n（这个国家，到处都是这样的人。他们就是我要拯救的对象。）'},
 {s:'诗织',x:'「所以我在想……基拉做的事，虽然是犯罪，可是——」'},
 {s:'诗织',x:'「（小声）可是我妈妈说，自从基拉出现，她晚上敢一个人走夜路了。」'},
],choices:[
 {label:'「基拉只是杀人犯。」',hint:'撇清关系，保护她',next:'c3_shiori_push'},
 {label:'「你觉得……基拉是正义的吗？」',hint:'试探她',next:'c3_shiori_pull'},
 {label:'转移话题，不谈基拉',hint:'不让她靠近这个话题',next:'c3_shiori_avoid'},
]},
c3_shiori_avoid:{bg:'class',chara:'',t:[
 {s:'夜神月',x:'「……判例的部分，我觉得应该从量刑标准来看。」'},
 {s:'',x:'你把话题拉回了学术。诗织愣了一下，随即笑了。'},
 {s:'诗织',x:'「夜神同学好认真啊。不过也是，聊这个太危险了，我爸爸说现在讨论基拉的人都要被警察记名字呢。」'},
 {s:'夜神月',x:'（……让她离这一切远一点。这是对她最好的。）'},
 {s:'',x:'但你没有意识到：在这个校园里，「离夜神月近」这件事本身，就已经是危险。'},
],next:'c3_naomi'},
c3_shiori_push:{bg:'class',chara:'',t:[
 {s:'夜神月',x:'「基拉只是杀人犯。不管理由多么冠冕堂皇，用私刑代替法律，只会让世界变成更大的地狱。」'},
 {s:'',x:'诗织眨了眨眼，然后笑了。'},
 {s:'诗织',x:'「……果然，夜神同学是这么想的。太好了。」'},
 {s:'诗织',x:'「其实我也觉得基拉不对。可是每次看到新闻里那些恶心的罪犯逍遥法外，我又忍不住会想『死了也好』——然后我就讨厌这样的自己。」'},
 {s:'诗织',x:'「所以听到你这么说，我安心多了。你是我认识的人里，最正直的那个。」'},
 {s:'夜神月',x:'（……最正直的那个。）'},
 {s:'',x:'她说这话的时候，眼睛是亮的。\n而你，第一次在一个人面前，觉得自己的谎言有点重。'},
],next:'c3_naomi',stats:{heart:3}},
c3_shiori_pull:{bg:'class',chara:'',t:[
 {s:'夜神月',x:'「诗织，你觉得……基拉是正义的吗？」'},
 {s:'诗织',x:'「诶？」'},
 {s:'诗织',x:'「唔……我不知道。杀人肯定是错的。可是——如果这个世界的法律，本来就抓不到那些最坏的人呢？」'},
 {s:'诗织',x:'「如果有一个人，能替所有受害者做那件『法律做不到的事』……那他到底是恶魔，还是——」'},
 {s:'',x:'她说到一半，自己摇了摇头。'},
 {s:'诗织',x:'「抱歉，我在说什么呀。这种话被听到会被当成基拉支持者的。」'},
 {s:'夜神月',x:'（……她动摇了。就像这个国家的每一个人一样。）\n（只要再推一把，她就会成为信徒。）'},
 {s:'夜神月',x:'（可是——为什么，我并不想推这一把？）'},
],next:'c3_naomi',stats:{sup:2,heart:-2}},

/* ---------- 南空直美 ---------- */
c3_naomi:{bg:'street',day:62,chara:'',bgm:'l',t:[
 {s:'',x:'警视厅门口。你替父亲送文件出来，一个穿黑色大衣的女人叫住了你。'},
 {s:'',x:'她的眼睛通红，但站姿笔直得像把刀。'},
 {s:'南空直美',x:'「你是夜神局长的儿子？我叫……<span class="l">时户成美</span>。我的未婚夫，是死在日本的 FBI 探员之一。」'},
 {s:'夜神月',x:'（假名。她在用假名。职业习惯——她也是 FBI 出身。）'},
 {s:'南空直美',x:'「我想请你转告 L 一件事。关于基拉能力的推测。我发现了一个——只有杀人犯自己才会知道的破绽。」'},
 {s:'夜神月',x:'（——！）\n（破绽？她发现了什么？）'},
 {s:'夜神月',x:'（无论如何，绝不能让她见到 L。必须先套出她的真名。）'},
],next:'c3_naomi2'},
c3_naomi2:{bg:'street',chara:'',bgm:'l',t:[
 {s:'夜神月',x:'「我可以带您去见 L。不过为了确认身份，请您在这份访客登记上，写下真实姓名。」'},
 {s:'',x:'你递出笔和登记板。这是最经典、也最致命的一招。'},
 {s:'南空直美',x:'「……」'},
 {s:'',x:'她盯着那张纸，看了很久。手指在笔上收紧又松开。'},
 {s:'南空直美',x:'「……抱歉。我不能写。」'},
 {s:'夜神月',x:'（——！）'},
 {s:'南空直美',x:'「我的未婚夫死前告诉过我：基拉，只需要名字和脸。」'},
 {s:'南空直美',x:'「而你，从刚才开始，就一直在盯着我的脸看。」'},
],choices:[
 {label:'继续诱导：「不写名字，L 不会见你」',hint:'施压，逼她就范',next:'c3_naomi_push',dark:true},
 {label:'退一步：「那我替您转告 L」',hint:'放弃套名，先获取情报',next:'c3_naomi_info'},
 {label:'⚠ 主动警告她：「快离开东京」',hint:'原创路线：救她一命',next:'c3_naomi_save'},
]},
c3_naomi_push:{bg:'street',chara:'',bgm:'write',t:[
 {s:'夜神月',x:'「时户女士，我理解您的警惕。但没有身份确认，L 不会见任何人。」'},
 {s:'夜神月',x:'「而且——如果您真的握有关键情报，越晚交出去，就会有越多人因为基拉而死。」'},
 {s:'',x:'（这是她无法反驳的逻辑。作为一个前执法者，她的责任感就是最大的弱点。）'},
 {s:'',x:'她的手，终于落在了纸上。\n笔尖划过的那一刻，你看清了那三个字：<span class="bad">南空直美</span>。'},
 {s:'夜神月',x:'（拿到了。）'},
],next:'c3_naomi_dead'},
c3_naomi_dead:{bg:'night',chara:'ryuk',bgm:'write',write:'南空直美',t:[
 {s:'',x:'第二天的新闻里没有她。她只是……不见了。一个用假名生活、没有亲属在日本的女人，消失得无声无息。'},
 {s:'琉克',x:'「呐，月。她昨天说的『破绽』，你不好奇吗？」'},
 {s:'夜神月',x:'「（顿了一下）……不好奇。死人不会说话。」'},
 {s:'',x:'但那天夜里，你反复想着她的最后一句话。\n她说：「我的未婚夫死前告诉过我。」\n她说得那样平静。'},
 {s:'夜神月',x:'（她只是想为爱人报仇的女人。而我，用她的责任感做诱饵，杀了她。）'},
 {s:'夜神月',x:'（……这就是神的道路。我早就知道会是这样。）'},
 {s:'',x:'你这样告诉自己，一直到天亮。'},
],next:'c3_end',stats:{sus:-6,heart:-16,sup:2}},
c3_naomi_info:{bg:'street',chara:'',bgm:'l',t:[
 {s:'夜神月',x:'「……我明白了。那么请您把情报告诉我，我一定原封不动地转告 L。」'},
 {s:'南空直美',x:'「不行。这件事，我只能当面对 L 说。」'},
 {s:'',x:'她转身离开了。而你站在原地，第一次感到失控。'},
 {s:'夜神月',x:'（她掌握着什么？「只有杀人犯自己才知道的破绽」——是死亡时间的操控？还是笔记的规则？）'},
 {s:'夜神月',x:'（我必须在她见到 L 之前找到她。可我连她的真名都没有。）'},
 {s:'',x:'三天后，你在电视上看到 L 的搜查本部召开了一次紧急会议。\n<span class="l">而你没有被通知。</span>'},
],next:'c3_end',stats:{sus:12,heart:-4}},
c3_naomi_save:{bg:'street',chara:'light',bgm:'menu',t:[
 {s:'',x:'你张了张嘴。'},
 {s:'',x:'你本该套出她的名字。这是最优解，你的大脑在零点几秒内就算清了所有步骤。'},
 {s:'',x:'但你听见自己的声音说：'},
 {s:'夜神月',x:'「……时户女士。听我一句劝：立刻离开东京，越远越好。」'},
 {s:'南空直美',x:'「……什么？」'},
 {s:'夜神月',x:'「你的未婚夫说得对——基拉只需要名字和脸。而你现在，站在警视厅门口，脸暴露在所有人的视线里。」'},
 {s:'夜神月',x:'「你已经做得够多了。剩下的，交给活着的人。」'},
 {s:'',x:'她盯着你看了很久。那双通红的眼睛里，有什么东西松动了。'},
 {s:'南空直美',x:'「……你是个好人，夜神同学。谢谢你。」'},
 {s:'',x:'她走了。当晚，一班飞往洛杉矶的航班载走了一个用假名登机的女人。'},
],next:'c3_naomi_save2'},
c3_naomi_save2:{bg:'night',chara:'ryuk',bgm:'menu',t:[
 {s:'琉克',x:'「月。我不明白。」'},
 {s:'琉克',x:'「她随时可能想起什么、随时可能回来指证你。你放走了一颗定时炸弹。」'},
 {s:'琉克',x:'「为什么？」'},
 {s:'夜神月',x:'「……」'},
 {s:'夜神月',x:'（为什么？）'},
 {s:'夜神月',x:'（因为她让我想起了什么。想起了……我最初拿起笔的那个晚上。）'},
 {s:'夜神月',x:'（那时候我想保护的，就是这样的人。为爱的人流泪、还愿意为陌生人的安全去冒险的人。）'},
 {s:'夜神月',x:'（如果连这样的人我都要杀——那我到底在创造什么样的新世界？）'},
 {s:'夜神月',x:'「琉克。这不是仁慈。」'},
 {s:'夜神月',x:'「这是……我给自己留的最后一条底线。」'},
 {s:'琉克',x:'「……哈。人类啊。」'},
],next:'c3_end',stats:{sus:2,heart:16,sup:-2}},

apple_light:{name:'一颗<span class="g">苹果</span>',tag:'魔改END · 苹果线 · 止损',story:'你放走了唯一一个，把你当朋友的人。\n\n你说不清那是仁慈，还是又一次精准的计算。\n但那天之后，你偶尔会在便利店的水果架前，\n多站一会儿。\n\n看着那些红苹果，\n想起自己曾经，也是个会为"对不对"而犹豫的人。\n——只是那个人，已经死在成为神的路上了。'},

ch3:{name:'第三章<br><span class="g">完</span>',tag:'To be continued · 第四章制作中',story:'你和他住在同一个屋檐下。\n吃同一锅饭，看同一场雨，\n聊正义，聊未来，聊基拉。\n\n你们是彼此见过最聪明的人，\n也是彼此唯一的敌人。\n\n如果不是这场战争——\n你们本来，会是最好的朋友。\n\n（第四章《第二基拉》制作中）'},
ch2:{name:'第二章<br><span class="g">完</span>',tag:'To be continued · 第三章制作中',story:'你与看不见的 L，下成了平局。\n\n但每赢一步，你的名字就离他更近一分。\n下一章，棋盘上将不再有屏幕的阻隔——\n他会伸出手，说：「初次见面，我是 L。」\n\n（想催更第三章《同一屋檐》，就去找作者。）'},
