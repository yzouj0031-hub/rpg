<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#08060b">
<title>夜神月模拟器</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;500;700;900&family=Noto+Sans+SC:wght@300;400;500&display=swap');
:root{
  --void:#08060b; --ink:#120d18;
  --gold:#c9a84c;        /* 神性的金 */
  --blood:#a3231f; --blood-hot:#d64541;
  --bone:#e2dccf; --dim:#4a4258; --mist:#8b8398;
  --l-blue:#5b7f9e;      /* L 的冷蓝 */
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--void);overflow:hidden;}
body{color:var(--bone);font-family:'Noto Sans SC',sans-serif;font-weight:300;user-select:none;}
#app{position:relative;height:100dvh;max-width:900px;margin:0 auto;overflow:hidden;display:flex;flex-direction:column;}

/* ---------- 场景背景 ---------- */
#bg{position:absolute;inset:0;transition:background 1.4s ease;
  background:radial-gradient(ellipse 100% 70% at 50% 0%, #1a1226, var(--void) 70%);}
#app[data-bg="class"]  #bg{background:linear-gradient(180deg,#2a2438 0%,#181226 55%,var(--void));}
#app[data-bg="street"] #bg{background:linear-gradient(180deg,#1c1420 0%,#0e0a14 60%,var(--void));}
#app[data-bg="room"]   #bg{background:radial-gradient(ellipse 90% 60% at 50% 20%, #241a2e, var(--void) 75%);}
#app[data-bg="night"]  #bg{background:linear-gradient(180deg,#0a0e1e 0%,#0a0714 60%,var(--void));}
#app[data-bg="tv"]     #bg{background:radial-gradient(ellipse 70% 45% at 50% 35%, #2c1518, var(--void) 75%);}
#app[data-bg="hq"]     #bg{background:linear-gradient(180deg,#101a24 0%,#0a0e16 60%,var(--void));}
#app[data-bg="god"]    #bg{background:radial-gradient(ellipse 90% 70% at 50% 30%, #3a2c10, #150e04 75%);}
/* 窗格光影 */
#bg::after{content:'';position:absolute;inset:0;opacity:.25;
  background:repeating-linear-gradient(90deg, transparent 0 90px, rgba(255,255,255,.015) 90px 92px);}

/* ---------- 立绘 ---------- */
#chara{position:absolute;left:50%;bottom:24dvh;transform:translateX(-50%) translateY(14px);
  height:66dvh;max-height:640px;pointer-events:none;
  opacity:0;transition:opacity .55s ease, transform .55s ease, filter .5s;
  display:flex;align-items:flex-end;justify-content:center;}
#chara.on{opacity:1;transform:translateX(-50%) translateY(0);}
#chara img{height:100%;width:auto;object-fit:contain;
  filter:drop-shadow(0 6px 30px rgba(0,0,0,.7));}
/* 说话时点亮，非说话时压暗——galgame 惯例 */
#chara.gold img{filter:drop-shadow(0 0 26px rgba(201,168,76,.35)) drop-shadow(0 6px 20px rgba(0,0,0,.7));}
#chara.blue img{filter:drop-shadow(0 0 26px rgba(91,127,158,.4)) drop-shadow(0 6px 20px rgba(0,0,0,.7));}
#chara.red img{filter:drop-shadow(0 0 30px rgba(214,69,65,.4)) drop-shadow(0 6px 20px rgba(0,0,0,.7));}
#chara.dim img{filter:brightness(.5) drop-shadow(0 6px 20px rgba(0,0,0,.7));}
/* Q版：更小、坐落画面下方、轻微弹跳 */
#chara.chibi{height:38dvh;max-height:340px;bottom:30dvh;}
#chara.chibi img{animation:qbob 2.6s ease-in-out infinite;}
@keyframes qbob{0%,100%{transform:translateY(0) rotate(-1deg);}50%{transform:translateY(-7px) rotate(1deg);}}
/* 反差杀：Q版→正常立绘的一震 */
#chara.snap{animation:snapin .4s cubic-bezier(.2,1.6,.4,1);}
@keyframes snapin{0%{transform:translateX(-50%) scale(.75);filter:brightness(2.2);}
 45%{transform:translateX(-50%) scale(1.07);}100%{transform:translateX(-50%) scale(1);}}

/* ---------- 顶部状态 ---------- */
#hud{position:relative;z-index:5;display:flex;justify-content:space-between;align-items:center;
  padding:calc(10px + env(safe-area-inset-top)) 18px 8px;}
#day{font-family:'Noto Serif SC',serif;font-weight:700;letter-spacing:.3em;font-size:14px;color:var(--gold);}
#stats{display:flex;gap:14px;}
.stat{font-size:10px;letter-spacing:.15em;color:var(--mist);text-align:right;}
.stat b{display:block;font-family:'Noto Serif SC',serif;font-size:13px;font-weight:500;letter-spacing:.1em;margin-top:2px;}
#sSus b{color:var(--l-blue);} #sSup b{color:var(--blood-hot);} #sHeart b{color:var(--bone);}

/* ---------- 对话框 ---------- */
#dlg{position:relative;z-index:6;margin-top:auto;
  background:linear-gradient(180deg, rgba(10,7,14,.4), rgba(8,6,11,.96) 30%);
  padding:14px 22px calc(16px + env(safe-area-inset-bottom));
  min-height:34dvh;display:flex;flex-direction:column;}
#timebar{display:none;height:2px;background:#1a1522;margin:0 0 10px;border-radius:2px;overflow:hidden;}
#timefill{height:100%;width:100%;background:var(--gold);transition:background .3s;}
#speaker{font-family:'Noto Serif SC',serif;font-weight:700;font-size:15px;letter-spacing:.25em;
  color:var(--gold);margin-bottom:8px;min-height:22px;}
#speaker.l{color:var(--l-blue);} #speaker.ryuk{color:var(--blood-hot);} #speaker.sys{color:var(--mist);}
#text{font-size:15.5px;line-height:2.05;color:#cfc9bc;white-space:pre-wrap;flex:1;}
#text .em{color:var(--gold);} #text .bad{color:var(--blood-hot);} #text .l{color:var(--l-blue);}
#next{align-self:flex-end;font-size:12px;color:var(--dim);letter-spacing:.3em;animation:blink 1.6s infinite;margin-top:6px;}
@keyframes blink{0%,100%{opacity:.2}50%{opacity:.9}}
#choices{display:flex;flex-direction:column;gap:9px;padding-top:10px;}
.ch{appearance:none;border:1px solid #2a2336;background:rgba(18,13,24,.9);color:var(--bone);
  font-family:'Noto Sans SC',sans-serif;font-weight:300;font-size:14.5px;letter-spacing:.1em;
  text-align:left;padding:13px 16px;border-radius:2px;cursor:pointer;transition:border-color .2s;}
.ch:active{border-color:var(--gold);background:rgba(38,30,20,.9);}
.ch.dark{border-color:#3a1512;} .ch.dark:active{border-color:var(--blood-hot);}
.ch small{display:block;font-size:11px;color:var(--dim);margin-top:3px;letter-spacing:.15em;}

/* ---------- 效果 ---------- */
#flash{position:fixed;inset:0;z-index:40;background:#fff;opacity:0;pointer-events:none;transition:opacity .12s;}
#gazeveil{position:fixed;inset:0;z-index:38;pointer-events:none;opacity:0;transition:opacity 1.1s;
  background:radial-gradient(ellipse 60% 55% at 50% 50%, transparent 30%, rgba(20,40,60,.55) 100%);
  box-shadow:inset 0 0 120px rgba(91,127,158,.35);}
#redveil{position:fixed;inset:0;z-index:39;pointer-events:none;opacity:0;transition:opacity 1.2s;
  background:radial-gradient(ellipse 80% 70% at 50% 50%, transparent 40%, rgba(120,10,10,.35));}
body.writing #redveil{opacity:1;}
#deathnote{position:fixed;inset:0;z-index:45;display:none;align-items:center;justify-content:center;
  background:rgba(4,3,6,.92);flex-direction:column;gap:26px;}
#deathnote.on{display:flex;}
#dn-page{width:min(84vw,420px);background:#0d0b10;border:1px solid #2a2336;padding:30px 26px;position:relative;}
#dn-page::before{content:'DEATH NOTE';position:absolute;top:10px;left:0;right:0;text-align:center;
  font-size:10px;letter-spacing:.6em;color:#3a3346;}
#dn-name{font-family:'Noto Serif SC',serif;font-size:30px;font-weight:700;letter-spacing:.2em;color:var(--bone);
  text-align:center;margin-top:20px;min-height:46px;border-bottom:1px solid #2a2336;padding-bottom:12px;}
#dn-name.write{animation:inkin 1.6s steps(12) forwards;}
@keyframes inkin{from{clip-path:inset(0 100% 0 0);}to{clip-path:inset(0 0 0 0);}}
#dn-sub{text-align:center;font-size:12px;letter-spacing:.3em;color:var(--dim);margin-top:14px;}

/* ---------- 标题/结局 ---------- */
.screen{position:fixed;inset:0;z-index:60;display:none;flex-direction:column;align-items:center;justify-content:center;
  background:var(--void);padding:32px;text-align:center;}
.screen.on{display:flex;}
.screen h1{font-family:'Noto Serif SC',serif;font-weight:900;font-size:42px;letter-spacing:.28em;color:var(--bone);line-height:1.5;}
.screen h1 .g{color:var(--gold);} .screen h1 .r{color:var(--blood-hot);}
.screen .sub{margin-top:16px;font-size:12px;letter-spacing:.35em;color:var(--dim);line-height:2.2;}
.screen .story{margin-top:24px;max-width:440px;font-size:14px;line-height:2.3;color:#a8a295;text-align:left;white-space:pre-wrap;}
.screen .btn{margin-top:36px;appearance:none;border:1px solid var(--dim);background:transparent;color:var(--bone);
  font-family:'Noto Serif SC',serif;font-size:15px;letter-spacing:.5em;padding:13px 30px 13px 36px;cursor:pointer;border-radius:2px;}
.screen .btn:active{border-color:var(--gold);color:var(--gold);}
.btnrow{display:flex;gap:12px;margin-top:36px;flex-wrap:wrap;justify-content:center;}
.btnrow .btn{margin-top:0;}
#endTitle .endtag{margin-top:10px;font-size:12px;letter-spacing:.4em;color:var(--blood);}
@media (prefers-reduced-motion: reduce){*{animation:none !important;}}
</style>
</head>
<body>
<div id="app" data-bg="class">
  <div id="bg"></div>
  <div id="chara"><img id="charaImg" alt="" src=""></div>

  <div id="hud">
    <div style="display:flex;align-items:center;gap:10px">
      <button id="menuBtn" style="appearance:none;border:1px solid #2a2336;background:rgba(18,13,24,.8);color:#8b8398;font-size:11px;letter-spacing:.2em;padding:5px 10px;border-radius:2px;cursor:pointer">☰ 菜单</button>
      <div id="day">第 1 天</div>
    </div>
    <div id="stats">
      <div class="stat" id="sSus">L的怀疑<b>0%</b></div>
      <div class="stat" id="sSup">基拉支持率<b>0%</b></div>
      <div class="stat" id="sHeart">理性<b>100</b></div>
    </div>
  </div>

  <div id="dlg">
    <div id="timebar"><div id="timefill"></div></div>
    <div id="speaker"></div>
    <div id="text"></div>
    <div id="next">▼ 点击继续</div>
    <div id="choices"></div>
  </div>
</div>

<div id="flash"></div><div id="redveil"></div>
<div id="gazeveil"></div>
<div id="deathnote"><div id="dn-page"><div id="dn-name"></div><div id="dn-sub">心脏麻痹 · 40秒后</div></div></div>

<div class="screen on" id="titleScreen">
  <h1>夜神月<br><span class="g">模拟器</span></h1>
  <div class="sub">第一章 · 拾获<br>粉丝同人作品 · 仅供个人娱乐</div>
  <div class="story">2003年，深秋。
你是夜神月——全国模拟考第一，警察厅刑事局局长的儿子，
一个对这个腐烂的世界感到无可救药地厌倦的高中生。

直到那个下午，
一本黑色的笔记本，从天而降。

「名字被写上的人类，将会死亡。」</div>
  <div id="diffPick" style="display:flex;gap:8px;margin-top:26px;flex-wrap:wrap;justify-content:center"></div>
  <div id="diffTag" style="margin-top:12px;font-size:11px;letter-spacing:.2em;color:#4a4258;min-height:18px"></div>
  <div class="btnrow">
    <button class="btn" id="startBtn">拾 起 笔 记</button>
    <button class="btn" id="loadBtn" style="display:none">继 续 游 戏</button>
    <button class="btn" id="chapBtn" style="display:none">选 择 章 节</button>
  </div>
</div>

<div class="screen" id="menuScreen">
  <h1 style="font-size:30px">菜 <span class="g">单</span></h1>
  <div class="btnrow" style="flex-direction:column;width:min(80vw,320px);margin-top:30px">
    <button class="btn" id="mResume" style="width:100%">继 续 游 戏</button>
    <button class="btn" id="mChap" style="width:100%">选 择 章 节</button>
    <button class="btn" id="mTitle" style="width:100%">回 到 标 题</button>
  </div>
</div>
<div class="screen" id="chapScreen">
  <h1 style="font-size:32px">选 择 <span class="g">章 节</span></h1>
  <div class="sub">已解锁的章节可以直接开始<br>数值将按该章节起点重置</div>
  <div id="chapList" style="margin-top:30px;display:flex;flex-direction:column;gap:11px;width:min(88vw,420px)"></div>
  <button class="btn" id="chapBack" style="margin-top:28px">返 回</button>
</div>
<div class="screen" id="endTitle">
  <h1 id="endName"></h1><div class="endtag" id="endTag"></div>
  <div class="story" id="endStory"></div>
  <div class="btnrow">
    <button class="btn" onclick="location.reload()">回 到 标 题</button>
    <button class="btn" id="endChapBtn">选 择 章 节</button>
  </div>
</div>

<script>
/* ================= BGM ================= */
const BGMS={menu:'assets/bgm/the_twelve_o_clock_toll.mp3',write:'assets/bgm/the_measured_fall.mp3',l:'assets/bgm/the_final_deduction.mp3'};
const bgmEl={};let curBgm=null;
function bgm(key){
  if(key===curBgm)return;
  const prev=curBgm?bgmEl[curBgm]:null;curBgm=key;
  if(!bgmEl[key]){const a=new Audio(BGMS[key]);a.loop=true;a.volume=0;a.preload='auto';bgmEl[key]=a;}
  const nxt=bgmEl[key];nxt.play().catch(()=>{});
  const iv=setInterval(()=>{let done=true;
    if(prev&&prev!==nxt){prev.volume=Math.max(0,prev.volume-0.06);if(prev.volume>0.01)done=false;else prev.pause();}
    nxt.volume=Math.min(0.55,nxt.volume+0.05);if(nxt.volume<0.54)done=false;
    if(done)clearInterval(iv);},90);
}
/* ================= 引擎 ================= */
const $=id=>document.getElementById(id);
const S={day:1,sus:0,sup:0,heart:100,node:'d1_1',flags:{},chapter:1};
function clamp(v){return Math.max(0,Math.min(100,v));}
/* ── 难度 ── */
const DIFF={
 1:{name:'一星 · 体验剧情',mul:.5,heartMul:.5,raid:false,panic:false,timer:0,lethal:false,hideSus:false,gaze:0,
    tag:'安心看故事 · 无倒计时 · 不会失败'},
 3:{name:'三星 · 标准',mul:1,heartMul:1,raid:true,raidAt:80,panic:false,timer:12,lethal:false,hideSus:false,gaze:.18,
    tag:'限时抉择 · L的突击审讯 · 一次失误尚可挽回'},
 5:{name:'五星 · 地狱',mul:1.7,heartMul:1.7,raid:true,raidAt:58,panic:true,timer:6,lethal:true,hideSus:true,gaze:.36,
    tag:'⚠ 6秒抉择 · 怀疑度不可见 · 致命选项即死 · L无时无刻不在看着你'},
};
function dif(){return DIFF[S.diff||3];}
function setStats(d){ const D=dif();
  if(d.sus)S.sus=clamp(S.sus+(d.sus>0?d.sus*D.mul:d.sus));
  if(d.sup)S.sup=clamp(S.sup+d.sup);
  if(d.heart)S.heart=clamp(S.heart+(d.heart<0?d.heart*D.heartMul:d.heart));
  $('sSus').querySelector('b').textContent=dif().hideSus?'？？':(S.sus+'%');
  $('sSup').querySelector('b').textContent=S.sup+'%';
  $('sHeart').querySelector('b').textContent=S.heart;
  if(d.lethal&&dif().lethal){go('end_caught');return true;}
  if(S.sus>=100){go('end_caught');return true;}
  if(S.heart<=0){go('end_broken');return true;}
  // 五星/三星：怀疑度过高触发 L 的突击审讯
  if(D.raid&&S.sus>=D.raidAt&&!S.flags.raiding&&curNode&&curNode.indexOf('raid')<0){
    S.flags.raiding=true;S.resumeTo=pendingNext||curNode;setTimeout(()=>go('raid_1'),60);return true;}
  // 五星：理性过低会失控
  if(D.panic&&S.heart<=25&&!S.flags.panicked&&Math.random()<.5){
    S.flags.panicked=true;S.resumeTo=pendingNext||curNode;setTimeout(()=>go('panic_1'),60);return true;}
  return false;}
function setDay(n){S.day=n;$('day').textContent='第 '+n+' 天';}
const CHARA={
 light:{src:'assets/chara/light.webp',tone:'gold'},
 L:{src:'assets/chara/l.webp',tone:'blue'},
 ryuk:{src:'assets/chara/ryuk.webp',tone:'red'},
 shiori:{src:'assets/chara/shiori_smile.webp',tone:'gold'},
 shiori_think:{src:'assets/chara/shiori_think.webp',tone:'gold'},
 shiori_uneasy:{src:'assets/chara/shiori_uneasy.webp',tone:'gold'},
 shiori_tear:{src:'assets/chara/shiori_tear.webp',tone:'gold'},
 naomi:{src:'assets/chara/naomi_calm.webp',tone:'blue'},
 naomi_grief:{src:'assets/chara/naomi_grief.webp',tone:'blue'},
 misa:{src:'assets/chara/misa_smile.webp',tone:'red'},
 misa_mad:{src:'assets/chara/misa_mad.webp',tone:'red'},
 misa_angry:{src:'assets/chara/misa_angry.webp',tone:'red'},
 rem:{src:'assets/chara/rem.webp',tone:'blue'},
 // Q版
 q_light:{src:'assets/chibi/light_errand.webp',tone:'gold',chibi:1},
 q_light_stone:{src:'assets/chibi/light_stone.webp',tone:'gold',chibi:1},
 q_ryuk:{src:'assets/chibi/ryuk_apple.webp',tone:'red',chibi:1},
 q_duo:{src:'assets/chibi/duo_night.webp',tone:'gold',chibi:1},
 q_L:{src:'assets/chibi/l_chibi.webp',tone:'blue',chibi:1},
};
// 说话人 → 立绘key，用于明暗联动
const SPEAKER2KEY={'夜神月':['light','q_light','q_light_stone','q_duo'],'L':['L','q_L'],'龙崎':['L','q_L'],'琉克':['ryuk','q_ryuk','q_duo'],'诗织':['shiori','shiori_think','shiori_uneasy','shiori_tear'],'南空直美':['naomi','naomi_grief'],'弥海砂':['misa','misa_mad','misa_angry'],'雷姆':['rem']};
let charaKey=null;
function setChara(who){
  const c=$('chara'),img=$('charaImg');
  if(!who){c.className='';charaKey=null;return;}
  const def=CHARA[who];if(!def){c.className='';return;}
  const wasChibi=charaKey&&CHARA[charaKey]&&CHARA[charaKey].chibi;
  const isChibi=!!def.chibi;
  if(charaKey!==who){img.src=def.src;charaKey=who;}
  c.className='on '+def.tone+(isChibi?' chibi':'');
  // 反差杀：从Q版切回正常立绘时，猛地一震+闪白
  if(wasChibi&&!isChibi){
    c.classList.add('snap');
    const fl=$('flash');fl.style.transition='opacity .06s';fl.style.opacity=.55;
    setTimeout(()=>{fl.style.opacity=0;fl.style.transition='opacity .12s';},70);
    setTimeout(()=>c.classList.remove('snap'),420);
  }
}
function save(){localStorage.setItem('yagami_save',JSON.stringify(S));}
/* 章节解锁：玩到哪章就永久解锁哪章 */
const CHAPTERS=[
 {id:1,name:'第一章 · 拾获',node:'d1_1',day:1},
 {id:2,name:'第二章 · 尾行者',node:'c2_1',day:15},
 {id:3,name:'第三章 · 同一屋檐',node:'c3_1',day:35},
 {id:4,name:'第四章 · 第二基拉',node:'c4_1',day:70},
 {id:5,name:'第五章 · 记忆的代价',node:'c5_1',day:95},
];
function unlocked(){try{return JSON.parse(localStorage.getItem('yagami_unlocked'))||[1];}catch(e){return [1];}}
function unlock(n){const u=unlocked();if(!u.includes(n)){u.push(n);localStorage.setItem('yagami_unlocked',JSON.stringify(u));}}
/* 进入某节点时自动解锁对应章节 */
function autoUnlock(id){CHAPTERS.forEach(c=>{if(c.node===id)unlock(c.id);});}
function loadSave(){try{const d=JSON.parse(localStorage.getItem('yagami_save'));if(d){Object.assign(S,d);return true;}}catch(e){}return false;}

let queue=[],qi=0,typing=null,busy=false,curNode=null,pendingNext=null;
function go(id){
  if(id==='RESUME'){S.flags.raiding=false;const back=S.resumeTo||CHAPTERS[Math.max(0,(S.chapter||1)-1)].node;S.resumeTo=null;return go(back);}
  const n=STORY[id];
  if(!n){console.error('missing node',id);return;}
  curNode=id;S.node=id;autoUnlock(id);save();
  if(n.day)setDay(n.day);
  if(n.bg)$('app').dataset.bg=n.bg;
  if(n.chara!==undefined)setChara(n.chara);
  if(n.stats){if(setStats(n.stats))return;}
  if(n.end){showEnd(n.end);return;}
  if(n.write){bgm('write');writeName(n.write,()=>{if(n.bgm)bgm(n.bgm);queue=n.t.slice();qi=0;nextLine(n);});return;}
  if(n.bgm)bgm(n.bgm);
  queue=n.t.slice();qi=0;nextLine(n);
}
/* L 的凝视：随机在行间插入压迫感 */
function maybeGaze(){
  const g=dif().gaze;
  if(!g||Math.random()>g/6)return false;
  const lines=[
   '（……有人在看你。）',
   '（你回过头。走廊尽头空无一人。）',

function nextLine(n){

function showLine(sp,html){

  const c=$('chara');

    const keys=SPEAKER2KEY[sp]||[];
    const talking=keys.includes(charaKey)||(sp===''&&charaKey.indexOf('light')>=0);
    const def=CHARA[charaKey];
    c.className='on '+(talking?def.tone:'dim')+(def.chibi?' chibi':'');
  }
  $('choices').innerHTML='';$('next').style.display='none';
  const el=$('text');clearInterval(typing);el.innerHTML='';
  const tmp=document.createElement('div');tmp.innerHTML=html;const plain=tmp.textContent;let i=0;

$('dlg').addEventListener('click',e=>{
  if(e.target.closest('.ch'))return;
  if(typing){clearInterval(typing);typing=null;const n=STORY[curNode];const line=queue[qi-1];$('text').innerHTML=line.x;busy=false;$('next').style.display='block';return;}

});
let timerRAF=null;
function stopTimer(){if(timerRAF){cancelAnimationFrame(timerRAF);timerRAF=null;}$('timebar').style.display='none';}
function startTimer(sec,onOut){
  const bar=$('timebar'),fill=$('timefill');
  bar.style.display='block';fill.style.width='100%';fill.style.background='var(--gold)';
  const t0=performance.now(),ms=sec*1000;
  (function step(t){
    const p=Math.max(0,1-(t-t0)/ms);
    fill.style.width=(p*100)+'%';
    if(p<.35)fill.style.background='var(--blood-hot)';
    if(p<=0){stopTimer();onOut();return;}
    timerRAF=requestAnimationFrame(step);
  })(t0);
}
function showChoices(list){
  $('next').style.display='none';
  const box=$('choices');box.innerHTML='';
  list.forEach(c=>{ if(c.cond&&!c.cond(S))return;
    const b=document.createElement('button');b.className='ch'+(c.dark?' dark':'');
    b.innerHTML=c.label+(c.hint?'<small>'+c.hint+'</small>':'');
    b.onclick=()=>{ stopTimer(); pendingNext=c.next; if(c.stats){if(setStats(c.stats))return;} if(c.flag)S.flags[c.flag]=true; pendingNext=null; go(c.next); };
    box.appendChild(b);});
  // 限时抉择
  const n=STORY[curNode],sec=dif().timer;
  if(n&&n.timed&&sec>0){
    startTimer(sec,()=>{
      // 超时＝沉默，选最后一个"沉默/什么都没做"或惩罚
      const pen=n.timeout||{sus:12,heart:-8};
      showLine('','<span class="bad">……你沉默了太久。</span>\n（沉默，本身就是一种回答。）');
      $('choices').innerHTML='';
      setTimeout(()=>{ if(!setStats(pen)) go(n.timeoutNext||list[list.length-1].next); },1800);
    });
  }
}
function writeName(name,then){

  setTimeout(()=>{dn.classList.remove('on');document.body.classList.remove('writing');then();},2600);
}
function showEnd(key){
  const e=ENDS[key];
  $('endName').innerHTML=e.name;$('endTag').textContent=e.tag;$('endStory').textContent=e.story;

}

 {s:'夜神月',x:'（怎么办？当然是——把这次监视，变成我的武器。）'},
],next:'c2_plan'},
c2_plan:{bg:'room',day:16,chara:'light',bgm:'menu',t:[
 {s:'夜神月',x:'（问题的核心：我不知道跟踪我的探员叫什么名字，也不知道一共有几个人。）'},
 {s:'夜神月',x:'（如果能拿到<span class="em">全部探员的名单</span>，就能用笔记一次清除，让 L 在日本的眼睛全部失明。）'},
 {s:'夜神月',x:'（但怎么让一个训练有素的 FBI，自己交出名字？……我需要一个局。）'},
 {s:'琉克',x:'「嘿嘿，又开始了。你这种表情，最可怕了。」'},
],choices:[

c2_decoy:{bg:'street',chara:'',t:[
 {s:'',x:'接下来两天，你表演了一个完美的普通高中生：书店、汉堡店、和女生走在一起、在游戏厅消磨时间。'},
 {s:'夜神月',x:'（让他放松。让他在报告里写下"目标行为正常，疑似无关"。）\n（然后，在他最松懈的时候，收网。）'},
 {s:'',x:'第三天，你注意到跟踪的间距变大了。时机成熟了。'},
],next:'c2_bus'},
c2_bus:{bg:'street',day:18,chara:'',bgm:'l',t:[
 {s:'',x:'你上了一辆开往宇宙主题公园的巴士。灰西装探员，也若无其事地跟了上来，坐在后排。'},
 {s:'',x:'几站之后，一个神色慌张的男人突然拔枪站起——他劫持了巴士。\n（这个劫匪，是你用笔记提前操控、注定今天死亡的罪犯。一切都在计划内。）'},
 {s:'夜神月',x:'（现在，制造一个「我和探员是同伴」的假象，逼他亮出证件。）'},
],choices:[

c2_reveal:{bg:'street',chara:'',bgm:'l',t:[
 {s:'',x:'探员权衡了一下，压低声音回应你，亮明了立场——他确实是执法人员。\n计划的第一步成功了：他上钩了。'},
 {s:'',x:'混乱中，你假意配合，实则套话。而那名劫匪，在跳车逃跑后，如"预定"的一样，心脏麻痹倒地。'},
 {s:'夜神月',x:'（劫匪已清除，痕迹干净。而这位探员，已经确认我"疑似同伙"或"知情者"。）'},
 {s:'夜神月',x:'（下一步，才是真正的杀招——让他把<span class="em">所有同事的名字</span>交给我。）'},
],next:'c2_ray'},
c2_ray:{bg:'night',day:19,chara:'ryuk',bgm:'l',t:[
 {s:'',x:'通过一系列缜密的伪装与操控，你终于让那名探员——<span class="l">雷·潘伯</span>——相信：为了他的任务与安全，他必须查明并记录下所有同期探员的行动。'},
 {s:'琉克',x:'「你真的……做到了。让 FBI 自己把名单送上门。」'},
 {s:'夜神月',x:'（十二个名字。全部。）\n（只要写下去，L 在日本的耳目，将在同一时刻，全部消失。）'},
 {s:'',x:'笔尖悬在笔记本上方。这是本章最重的一笔。'},
],choices:[

c2_massacre:{bg:'tv',chara:'',bgm:'write',write:'雷·潘伯　外十一名',t:[
 {s:'',x:'同一时刻，日本各地。\n十二名 FBI 探员，在电车里、在街头、在酒店房间，同时倒下。'},
 {s:'',x:'消息传回时，L 沉默了很久。'},
 {s:'L',x:'「……一次十二人。基拉，你不只是审判者。你是在向全世界宣告：挡我者，死。」'},
 {s:'L',x:'「但你也告诉了我一件事——你，就在被这些探员监视的人当中。<span class="l">包围圈，缩小了。</span>」'},
 {s:'夜神月',x:'（代价我清楚。但 L 的眼睛，暂时瞎了。）'},
],next:'c2_end',stats:{sus:20,sup:10,heart:-10}},
c2_single:{bg:'tv',chara:'',bgm:'write',write:'雷·潘伯',t:[
 {s:'',x:'只有雷·潘伯一人倒下。其余探员撤回了美国，调查暂时受挫。'},
 {s:'L',x:'「只死了一个……你在收敛？还是在示弱？不。你是在减少暴露。」'},
 {s:'L',x:'「越谨慎，越说明你惜命、你聪明、你就在附近。基拉，我更确信了。」'},
 {s:'夜神月',x:'（震动小了，但 L 反而嗅到了我的"谨慎"。这个男人……真难缠。）'},
],next:'c2_end',stats:{sus:10,sup:3,heart:-4}},
c2_mercy:{bg:'night',chara:'light',bgm:'menu',t:[
 {s:'夜神月',x:'（不。他们只是奉命行事的执法者。滥杀无辜的守序者，会玷污新世界的正义。）'},
 {s:'夜神月',x:'（我要清扫的是"恶"，不是"挡路的人"——如果连这个界限都守不住，我和普通的杀人狂有什么区别？）'},
 {s:'',x:'你合上了笔记本。探员撤回，你逃过一次收网，也守住了心里那条正在变细的线。'},
 {s:'琉克',x:'「……你偶尔，会让我看不懂啊，月。」'},
],next:'c2_end',stats:{sus:-4,sup:-2,heart:8}},
c2_end:{bg:'god',chara:'light',bgm:'menu',t:[
 {s:'',x:'—— 第二章 · 尾行者　完 ——'},
 {s:'',x:'雷·潘伯的事件之后，L 决定亲自现身。命运的齿轮，本该按既定的轨迹转动。'},
 {s:'琉克',x:'「呐，月。今晚的苹果，你还没给我买。」'},
 {s:'夜神月',x:'（……什么？）'},
 {s:'琉克',x:'「说好的。写名字那么大的事你都干了，一个苹果不至于赖账吧？死神也是要吃饭的。」'},
 {s:'',x:'——就是这个微不足道的、荒诞的瞬间。\n历史，在这里分叉了。'},
],choices:[
 {label:'「……行，我去给你买。」',hint:'谁能想到，一切从这颗苹果开始崩坏',next:'br_apple_0'},

br_apple_0:{bg:'night',day:20,chara:'q_duo',bgm:'menu',t:[
 {s:'琉克',x:'「月——苹果——」'},
 {s:'夜神月',x:'「……我在算 L 的行动模式。」'},
 {s:'琉克',x:'「苹果。」'},
 {s:'夜神月',x:'「明天。」'},
 {s:'琉克',x:'「苹果苹果苹果苹果苹果苹果苹果苹果——」'},
 {s:'',x:'（死神的戒断反应比想象中严重。据说会全身扭曲成麻花状打滚三小时。）'},
 {s:'夜神月',x:'「…………好。我去买。」'},
 {s:'琉克',x:'「嘿嘿。就知道月最好了。」'},
 {s:'',x:'于是，全国模考第一、新世界的神、正在与 L 展开世纪对决的夜神月同学——\n在凌晨一点，出门给一只死神买水果去了。'},
],next:'br_apple_L_watch'},
br_apple_L_watch:{bg:'hq',chara:'q_L',bgm:'menu',t:[
 {s:'',x:'（与此同时，某间酒店套房。）'},
 {s:'L',x:'（蹲在椅子上，捧着监控画面）「……夜神月，凌晨一点出门。」'},
 {s:'L',x:'「目标地点：便利店。购买物品：苹果。数量：一个。」'},
 {s:'L',x:'（拈起一块蛋糕）「……为什么是苹果？为什么是凌晨一点？为什么只买一个？」'},
 {s:'L',x:'「一个人不会为了自己，在凌晨一点只买一个苹果。<span class="l">他是买给谁的？</span>」'},
 {s:'L',x:'「有同伙？共犯？还是——某种我尚未理解的存在？」'},
 {s:'',x:'（世界上最伟大的侦探，正在为一个苹果构建三十七种假说。）'},
 {s:'',x:'（他猜对了第三十八种。但那种可能性，他连想都不会去想。）'},
],next:'br_apple_L_theory'},
br_apple_L_theory:{bg:'hq',chara:'L',bgm:'l',t:[
 {s:'',x:'（同一间套房。三小时前。）'},
 {s:'',x:'——如果你没有杀死那些探员，此刻 L 手上的档案会厚得多。\n而正因为你杀了他们，这份薄薄的遗留简报，才显得格外刺眼。'},
 {s:'',x:'桌上摊着一份档案：<span class="l">FBI 探员集体死亡事件 · 遗留物调查</span>。'},
 {s:'L',x:'「十二名探员死亡的前一天，雷·潘伯提交过一份加密简报。因为他死了，这份简报延迟了三周才解密。」'},
 {s:'L',x:'「上面只有一行推论：<span class="l">『目标似乎极度警惕暴露真实姓名与面部。推测基拉的杀人条件为：名字＋脸。』</span>」'},
 {s:'L',x:'「配合我们已知的事实——基拉能指定死亡时间、能指定死因、能在完全不接触目标的情况下杀人。」'},
 {s:'L',x:'「这不是超能力。超能力不需要『名字』这种如此具体的输入。」'},
 {s:'L',x:'「这更像是……一种<span class="l">契约</span>。或者说，一种需要「登记」的杀人手段。」'},
],next:'br_apple_L_theory2'},
br_apple_L_theory2:{bg:'hq',chara:'L',bgm:'l',t:[
 {s:'L',x:'「如果需要登记名字，那就必须有一个<span class="l">载体</span>。」'},
 {s:'L',x:'「可能是纸、是电子档案、是某种仪式性的器物——我不知道。」'},
 {s:'L',x:'「但有一件事可以确定：<span class="l">基拉一定拥有某种他必须随身保护、绝不能被人看见的东西。</span>」'},
 {s:'L',x:'「而人类对『自己的秘密被他人拿在手上』这件事——是无法完全控制表情的。」'},
 {s:'L',x:'（他拈起一颗方糖，放进嘴里。）'},
 {s:'L',x:'「所以我要做一个实验。」'},
 {s:'L',x:'「我会伪造一个『载体』。如果我猜错了形态，他会觉得莫名其妙——那是最正常的反应。」'},
 {s:'L',x:'「但如果我猜对了……哪怕只对了三成……」'},
 {s:'L',x:'「他会在零点几秒之内，出现<span class="l">连他自己都察觉不到的反应</span>。」'},
 {s:'松田',x:'「可是龙崎，要伪造成什么样子？我们连它长什么样都不知道啊。」'},
 {s:'L',x:'「随便。一个黑色的本子就行。」'},
 {s:'L',x:'「重点不是它像不像。重点是——<span class="l">封面上写什么字，能让基拉的心跳漏一拍。</span>」'},
 {s:'',x:'（他在便签上写下两个英文单词，推给松田。）'},
 {s:'L',x:'「就写这个。DEATH NOTE。」'},
 {s:'松田',x:'「……死亡笔记？这也太直白了吧。」'},
 {s:'L',x:'「越直白越好。这不是证据，是<span class="l">鱼饵</span>。」'},
],next:'br_apple_1'},
br_apple_1:{bg:'street',day:20,chara:'q_duo',bgm:'menu',t:[
 {s:'',x:'深夜的便利店。冷白的灯。你站在水果货架前，手里捏着一颗红苹果。'},
 {s:'夜神月',x:'（我，全国模考第一，新世界的神……在半夜给一只死神跑腿买苹果。）'},
 {s:'',x:'（笔记本当然不在身上。它锁在书桌的暗格里，机关是我自己做的——打开方式错误就会引燃内页。除了我，没有人能碰到它。）'},
 {s:'琉克',x:'「那颗不行，有个疤。旁边那颗，对，红一点的。」'},
 {s:'',x:'收银台后，是个眼熟的店员——你们高中隔壁班的同学，成绩垫底、以爱管闲事出名的<span class="em">吉田</span>。'},
 {s:'吉田',x:'「哟，夜神？这么晚买苹果？……诶，你刚才是不是在跟空气说话？」'},
],choices:[
 {label:'「……只是自言自语。」',hint:'搪塞过去',next:'br_apple_2'},
 {label:'「你看得见我旁边的东西？」',hint:'试探他是否碰过什么',next:'br_apple_touch'},
]},
br_apple_touch:{bg:'street',chara:'q_light',t:[
 {s:'吉田',x:'「你旁边？就……空气啊？夜神你没事吧，学习压力太大了？」'},
 {s:'夜神月',x:'（看不见琉克。正常。）'},
 {s:'吉田',x:'「不过说真的，最近那个基拉，你怎么看？我觉得吧——能一个个弄死罪犯，这人肯定有啥超能力！说不定就在我们身边呢！」'},
 {s:'夜神月',x:'（……这个笨蛋，无意中说中了。）'},
],next:'br_apple_2'},
br_apple_2:{bg:'street',chara:'q_ryuk',bgm:'l',t:[
 {s:'',x:'你付了钱，把苹果抛给琉克。他一口咬下，发出满足的怪笑。'},
 {s:'琉克',x:'「唔——好吃。人间的苹果，果然是最棒的。」'},
 {s:'',x:'就在你转身要走时，吉田在身后叫住了你：'},
 {s:'吉田',x:'「诶夜神，等下——刚才有个客人落了个本子在柜台，黑色的。你认识字多，帮我看看这写的啥？」'},
],next:'br_apple_freeze2'},
br_apple_freeze2:{bg:'street',chara:'q_light_stone',bgm:'l',t:[
 {s:'',x:'他从柜台下抽出一本黑色的笔记本。'},
 {s:'',x:'封面上，印着两个英文单词：'},
 {s:'',x:'<span class="bad">DEATH NOTE。</span>'},
 {s:'',x:'……'},
 {s:'夜神月',x:'（…………）'},
],next:'br_apple_think'},
br_apple_think:{bg:'street',chara:'light',bgm:'l',t:[
 {s:'夜神月',x:'（冷静。冷静。）'},
 {s:'夜神月',x:'（我的笔记，此刻锁在我房间的暗格里。这是<span class="em">第二本</span>？还是——）'},
 {s:'',x:'你的视线扫过便利店的天花板。三个监控探头。其中一个的角度，正对着柜台前你站的位置。'},
 {s:'夜神月',x:'（……角度不对。那个探头，两周前还是朝着门口的。）'},
 {s:'夜神月',x:'（一个成绩垫底的高中同学、一间我每周都来的便利店、一本恰好在此刻出现的"死亡笔记"、一个被调整过角度的摄像头。）'},
 {s:'夜神月',x:'（<span class="l">是陷阱。是 L。</span>）'},
 {s:'夜神月',x:'（他没有证据，所以他在钓鱼：如果我是基拉，看到"另一本笔记"的瞬间，我的瞳孔、呼吸、指尖，一定会出卖我。）'},
 {s:'夜神月',x:'（但他是怎么想到"本子"的？……雷·潘伯。那个探员死前一定留下了报告。）\n（"基拉需要名字和脸"——从这一句，他推到了"必须有一个记录名字的载体"。）'},
 {s:'夜神月',x:'（可怕。他甚至不知道笔记的存在，却已经摸到了它的轮廓。）'},
 {s:'夜神月',x:'（甚至——如果我伸手去碰它，就等于承认我知道这东西是什么。）'},
 {s:'琉克',x:'「（凑近闻了闻）……月，这本是假的哦。就是普通的笔记本，随便写谁的名字都不会死人的。」'},
 {s:'夜神月',x:'（果然。）\n（那么现在，摄像头正在录我的每一个表情。我该怎么演？）'},
],choices:[
 {label:'完美的困惑：「Death Note？中二病吧。」',hint:'一个普通优等生该有的反应',next:'br_apple_perfect'},
 {label:'不碰它，建议吉田交给警察',hint:'过于谨慎，反而可疑',next:'br_apple_police'},
 {label:'将计就计，反过来利用这个陷阱',hint:'⚠ 把L的钓钩，变成我的鱼饵',next:'br_apple_counter',dark:true},
]},
br_apple_perfect:{bg:'street',chara:'L',bgm:'l',t:[
 {s:'',x:'你笑了一下，很自然地翻开第一页，扫了两眼。'},
 {s:'夜神月',x:'「『名字被写上的人会死』……哈，中二病写的吧。现在的高中生真是。」'},
 {s:'夜神月',x:'「说不定是哪个基拉的狂热粉丝，闲得没事干在模仿。」'},
 {s:'',x:'你把本子推回柜台，语气里带着恰到好处的、对幼稚事物的轻蔑。'},
 {s:'吉田',x:'「诶——真的假的？现在的小孩玩得这么花啊。」'},
 {s:'',x:'（第二天，搜查本部。）'},
 {s:'L',x:'「（看着回放）……翻页速度正常。瞳孔没有收缩。停留在第一页 1.8 秒——普通人扫读的合理时长。」'},
 {s:'L',x:'「他甚至主动嘲笑了它。完美。」'},
 {s:'L',x:'「<span class="l">太完美了。</span>」'},
 {s:'L',x:'「一个普通大学生，看到写着『Death Note』的本子，第一反应通常是好奇地多翻两页。而夜神月，只看了一页，就给出了结论。」'},
 {s:'L',x:'「就好像……他<span class="l">已经知道后面写的是什么</span>了。」'},
 {s:'夜神月',x:'（——这个男人，连"完美"本身都能当成证据。）'},
],next:'br_apple_aftermath',stats:{sus:6,heart:-4}},
br_apple_police:{bg:'street',chara:'L',bgm:'l',t:[
 {s:'夜神月',x:'「我不碰。你也别翻了。」'},
 {s:'吉田',x:'「诶？为啥啊？」'},
 {s:'夜神月',x:'「最近基拉的事闹得这么大，突然出现一本写着『死亡笔记』的本子——万一是什么犯罪证据呢？交给警察比较好。」'},
 {s:'',x:'（第二天，搜查本部。）'},
 {s:'L',x:'「他连碰都没碰。」'},
 {s:'松田',x:'「这不是很正常吗？谨慎的好青年啊。」'},
 {s:'L',x:'「松田先生，如果有人递给你一本写着『死亡笔记』的本子，你会怎么做？」'},
 {s:'松田',x:'「呃……肯定先翻开看看啊，多好玩。」'},
 {s:'L',x:'「是的。这就是问题所在。」'},
 {s:'L',x:'「<span class="l">只有知道那东西真的能杀人的人，才会本能地避开它。</span>」'},
 {s:'夜神月',x:'（……糟糕。太谨慎了。）\n（在 L 面前，连"合理"都可能是破绽。）'},
],next:'br_apple_aftermath',stats:{sus:12,heart:-6}},
br_apple_counter:{bg:'street',chara:'light',bgm:'l',t:[
 {s:'夜神月',x:'（既然是钓钩——那我就吞下去，然后连着钓竿一起拖走。）'},
 {s:'',x:'你拿起那本假笔记，翻了几页，然后露出了一个很有兴趣的表情。'},
 {s:'夜神月',x:'「吉田，这个能借我吗？我想拿去给我爸看看。」'},
 {s:'吉田',x:'「你爸？」'},
 {s:'夜神月',x:'「嗯。我父亲是警察。最近基拉的案子他们正头疼，说不定这是个模仿犯留下的线索。」'},
 {s:'',x:'（第二天，搜查本部。你父亲把那本"证物"郑重地交给了 L。）'},
 {s:'夜神父',x:'「龙崎，这是月发现的。他说可能与案件有关。」'},
 {s:'L',x:'「……」'},
 {s:'L',x:'（这本笔记是我放的。而他，把它<span class="l">当作线索送回了我手里</span>。）'},
 {s:'L',x:'（如果他是基拉，他一定看穿了这是陷阱。而他的反击是：让整个搜查本部见证"夜神月主动配合调查"。）'},
 {s:'L',x:'（他把我的陷阱，变成了他的清白证明。而我甚至不能说这是我放的——那等于承认我在私自试探警察局长的儿子。）'},
 {s:'L',x:'「……夜神同学。谢谢你的『线索』。」'},
 {s:'夜神月',x:'（不客气，L。）\n（下次布局，请再高明一点。）'},
],next:'br_apple_aftermath',stats:{sus:-8,sup:2,heart:-2}},
br_apple_aftermath:{bg:'night',day:21,chara:'ryuk',bgm:'menu',t:[
 {s:'',x:'那天夜里，你回到房间，确认暗格完好，笔记安然无恙。'},
 {s:'琉克',x:'「呐，月。刚才那个店员小哥……他其实什么都不知道吧？」'},
 {s:'夜神月',x:'「嗯。他只是被 L 挑中的道具。一个连自己在参与什么都不知道的、无辜的道具。」'},
 {s:'琉克',x:'「那他现在，算是见过『基拉嫌疑人』的人了哦。L 会保护他吗？」'},
 {s:'',x:'你沉默了。'},
 {s:'夜神月',x:'（……不会。用完就丢，这是 L 的作风，也是我的作风。）'},
 {s:'夜神月',x:'（一个高中同学，因为在便利店打夜班，被卷进了神与侦探的战争。他甚至不会知道自己曾经离死亡有多近。）'},
 {s:'夜神月',x:'（这就是我们这种人的世界。棋盘之外的人，连自己是棋子都不知道。）'},
],choices:[

]},
br_yoshida_protect:{bg:'street',day:26,chara:'',bgm:'menu',t:[
 {s:'',x:'接下来的一个月，你换了回家的路线，再也没去过那家便利店。'},
 {s:'',x:'期末的时候，你在学校门口远远看见吉田，正笑嘻嘻地跟朋友吹牛：「我跟你们说，上次有个客人落了本超中二的本子在我店里……」'},
 {s:'夜神月',x:'（活着。什么都不知道地活着。真好。）'},
 {s:'夜神月',x:'（……真好？）'},
 {s:'夜神月',x:'（我什么时候，开始会为「一个笨蛋活得好好的」这种事，感到欣慰了？）'},
 {s:'琉克',x:'「月，你刚才笑了哦。」'},
 {s:'夜神月',x:'「……我没有。」'},
],next:'br_yoshida_protect_end',stats:{heart:10}},

br_apple_recruit:{bg:'room',day:26,chara:'',bgm:'menu',t:[
 {s:'',x:'你开始"偶然"地频繁出现在那家便利店。买咖啡、聊天、指点他的功课。'},
 {s:'',x:'吉田受宠若惊——全校第一的夜神月，居然愿意和自己这种垫底生做朋友。'},
 {s:'夜神月',x:'（L 用他当过道具。而 L 用过的道具，往往还留着 L 的味道——他会再回来找吉田的。）'},
 {s:'夜神月',x:'（那么，我就在这个道具身上，装一个我的眼睛。）'},
 {s:'夜神月',x:'「吉田，你想不想做一件……真正有意义的事？」'},
 {s:'吉田',x:'「诶？夜神你说啥？」'},
 {s:'夜神月',x:'「我在帮我父亲调查基拉的案子。需要一个不起眼、但绝对可靠的人帮我留意一些事。」'},
 {s:'夜神月',x:'「比如——如果有陌生人来打听我，或者再有奇怪的东西出现在你店里，第一时间告诉我。」'},
 {s:'吉田',x:'「哇……我？帮忙抓基拉？！」'},
 {s:'',x:'他眼睛亮得像个孩子。他不知道自己刚刚，成了基拉的耳目。'},
],choices:[
 {label:'把吉田训练成「基拉的代理人」',hint:'一步步把普通人拖进深渊',next:'br_yoshida_arc'},
]},
br_yoshida_arc:{bg:'night',day:28,chara:'',bgm:'l',t:[
 {s:'',x:'一周过去了。吉田出乎意料地……好用。'},
 {s:'',x:'他替你取情报、望风、甚至学会了用一模一样的笔迹抄写名字。那个曾经善良、爱管闲事的笨蛋，在"参与神的事业"的虚荣里，一点点变了。'},
 {s:'吉田',x:'「夜神……今天这个贪污犯，我已经写好了。我写得对吗？我做得好吗？」'},
 {s:'夜神月',x:'（他不再问"这样对不对"，只问"我做得好不好"。）\n（正义感是最容易腐烂的东西。我只是……递了一把刀。）'},
 {s:'',x:'你看着吉田眼里那种谄媚的、渴望认可的光。\n忽然，一丝极淡的寒意，从你自己的脊背爬了上来。'},
 {s:'夜神月',x:'（我在创造一个新世界的神民。\n还是……在制造一个和我一样的怪物？）'},
],choices:[
 {label:'继续利用他，直到榨干',hint:'工具没有感情',next:'br_yoshida_dark',dark:true},
 {label:'及时收手，让他脱身',hint:'也许还来得及救他',next:'br_yoshida_mercy'},
]},
br_yoshida_dark:{bg:'tv',chara:'ryuk',bgm:'write',t:[
 {s:'',x:'又一个月。吉田成了警方眼中最活跃的"基拉嫌疑人"——因为所有露在明面上的痕迹，都是他留下的。'},
 {s:'',x:'当 L 的包围圈收拢时，落网的，是那个在审讯室里痛哭流涕、大喊"我是基拉、我创造了新世界"的吉田。'},
 {s:'',x:'没有人相信一个便利店店员的胡言乱语能是真凶。但也没有人，再往下查了。'},
 {s:'夜神月',x:'（完美的替罪羊。他甚至是"自愿"的。）'},
 {s:'琉克',x:'「月……你连朋友都用得这么干净。你啊，早晚有一天，会把自己也算进这盘棋里的。」'},
 {s:'',x:'你笑了笑，没有回答。\n因为你知道，琉克说的是对的。'},
],next:'br_apple_end_dark'},
br_yoshida_mercy:{bg:'room',chara:'light',bgm:'menu',t:[
 {s:'夜神月',x:'「吉田。这是最后一次。从明天起，你不认识我，也没见过任何笔记本。忘了这一切，回去当你的店员。」'},
 {s:'吉田',x:'「可是……新世界……我还想帮你……」'},
 {s:'夜神月',x:'「新世界不需要你搭上性命。走。」'},
 {s:'',x:'你看着他失魂落魄地离开。这一刻，你像是杀死了一个自己亲手创造的信徒，也像是……救了一个人。'},
 {s:'夜神月',x:'（连我自己都分不清，我这是仁慈，还是又一次精准的止损。）'},
 {s:'琉克',x:'「你偶尔会做些……不像神的事。这样的你，我倒是更看不透了。」'},
],next:'br_apple_end_light'},
br_apple_kill:{bg:'night',day:30,chara:'ryuk',bgm:'write',t:[
 {s:'夜神月',x:'（吉田见过那本假笔记，也见过我对它的反应。他是 L 和我之间，唯一的活体证人。）'},
 {s:'夜神月',x:'（只要 L 再找他谈一次，用催眠、用诱导、用任何手段——他都可能回忆起某个我自己都没察觉的细节。）'},
 {s:'夜神月',x:'（他必须消失。）'},
 {s:'琉克',x:'「……他什么都不知道哦，月。他只是个被 L 拉来演戏的临时演员。」'},
 {s:'夜神月',x:'「我知道。」'},
 {s:'',x:'笔尖落下。这一次，没有停顿。'},
],next:'br_apple_kill2',stats:{heart:-14,sus:4}},
br_apple_kill2:{bg:'tv',chara:'L',bgm:'l',write:'吉田',t:[
 {s:'',x:'三天后，一名便利店店员在下班途中心脏麻痹身亡。年龄十九岁，无犯罪记录，无病史。'},
 {s:'',x:'（搜查本部。L 盯着那份死亡报告，很久很久没有说话。）'},
 {s:'L',x:'「……夜神局长。这个人，是我为了试探令郎，临时雇用的。」'},
 {s:'夜神父',x:'「什么？！你擅自——」'},
 {s:'L',x:'「是的。而现在他死了。心脏麻痹。一个和基拉毫无关系的、干净的普通人。」'},
 {s:'L',x:'「基拉从不杀无辜者。这是他的行为准则，也是他一切正当性的来源。」'},
 {s:'L',x:'「<span class="l">除非——这个『无辜者』，威胁到了他自己。</span>」'},
 {s:'L',x:'「知道这个店员参与过试探的人，只有搜查本部的六个人……和被试探的那一个。」'},
 {s:'夜神月',x:'（——！）'},
 {s:'夜神月',x:'（我杀了他，就等于告诉 L：那场试探，我看穿了。）\n（我亲手，把一个「无法证明的怀疑」，变成了「无法反驳的行为证据」。）'},
],next:'br_apple_kill3',stats:{sus:22,sup:-10}},
br_apple_kill3:{bg:'night',chara:'ryuk',bgm:'menu',t:[
 {s:'',x:'那天夜里，你坐在黑暗的房间里，很久没有开灯。'},
 {s:'琉克',x:'「月，你不是一直说，你只杀该死的人吗？」'},
 {s:'夜神月',x:'「……」'},
 {s:'夜神月',x:'（第一个名字，是劫持幼儿园孩子的罪犯。）\n（第二个，是连环杀人犯。）\n（然后是 FBI，然后是……一个替 L 打工的便利店店员。）'},
 {s:'夜神月',x:'（我告诉自己每一次都有理由。而理由，一次比一次廉价。）'},
 {s:'夜神月',x:'（如果新世界的第一块砖，是用一个无辜者的命砌上去的——）'},
 {s:'夜神月',x:'（那我建的到底是天国，还是我自己的坟墓？）'},
 {s:'琉克',x:'「（咬了一口苹果）……人类啊。」'},
],next:'br_apple_end_kill'},

 {s:'',x:'四月。东应大学入学典礼。\n作为新生代表，你站在礼堂的讲台上，念完了那篇完美无缺的致辞。掌声像潮水。'},
 {s:'夜神月',x:'（全国第一。理所当然。）\n（FBI 的事已经过去两个月，L 一定还在暗处盯着我。但他没有证据——永远不会有。）'},
 {s:'',x:'典礼结束后，一个弓着背、赤脚穿着帆布鞋的男生，端着咖啡走到你身边。\n他把方糖一颗、两颗、三颗……一直加到第七颗。'},

c3_2:{bg:'street',day:35,chara:'L',bgm:'l',timed:1,timeout:{sus:18,heart:-6},timeoutNext:'c3_silent',t:[
 {s:'',x:'他抬起头。黑眼圈很重的、毫无波澜的眼睛，直直地看着你。'},
 {s:'龙崎',x:'「我叫龙崎。和你一样，是今年的新生代表。」'},
 {s:'龙崎',x:'「有件事，我想只告诉你一个人。」'},
 {s:'',x:'他凑近了一点。周围的喧闹好像瞬间被抽空了。'},
 {s:'L',x:'「<span class="l">我，就是 L。</span>」'},
 {s:'夜神月',x:'（————）'},
 {s:'夜神月',x:'（他说什么？L？这个男人，就是 L？）\n（不。冷静。这是试探。他在观察我这一秒的表情、瞳孔、呼吸。）'},
 {s:'夜神月',x:'（任何一丝异常，都会成为他的证据。）'},
],choices:[
 {label:'完美的惊讶：「诶？L？那个 L？」',hint:'普通大学生该有的反应',next:'c3_act',stats:{heart:-2}},
 {label:'冷静反问：「你为什么告诉我？」',hint:'反将一军，把问题抛回去',next:'c3_counter'},

c3_act:{bg:'street',chara:'L',bgm:'l',t:[
 {s:'夜神月',x:'「诶——？L？那个抓基拉的 L？你在开玩笑吧。」'},
 {s:'',x:'你的表情、语气、身体前倾的角度，全部完美。一个听到荒唐笑话的普通优等生。'},
 {s:'L',x:'「……嗯。反应很自然。」'},
 {s:'L',x:'「不过夜神同学，你知道吗？听到这句话的人，通常有两种反应：\n第一种是笑，第二种是害怕。」'},
 {s:'L',x:'「而你，是<span class="l">先笑，然后才想起要害怕</span>。顺序，反了。」'},

],next:'c3_after_meet',stats:{sus:8,heart:-4}},
c3_counter:{bg:'street',chara:'L',bgm:'l',t:[
 {s:'夜神月',x:'「……你为什么要告诉我这种事？」'},
 {s:'L',x:'「因为我怀疑你是基拉。」'},
 {s:'夜神月',x:'「……哈？」'},
 {s:'L',x:'「如果你是基拉，你现在就能杀我——但你不知道我的真名，所以你不会。\n如果你不是基拉，你会觉得我是疯子——但你没有。你在<span class="l">分析</span>。」'},
 {s:'L',x:'「普通人被指认为连环杀人犯，第一反应是愤怒或恐惧。而你，在计算。」'},
 {s:'夜神月',x:'（这个男人……每一句话都是陷阱。回答本身就是数据。）\n（但至少，我从他嘴里确认了一件事：<span class="em">他没有证据。</span>他在赌，在诈我。）'},
],next:'c3_after_meet',stats:{sus:6,heart:-2}},
c3_silent:{bg:'street',chara:'L',bgm:'l',t:[
 {s:'',x:'你什么都没说。只是平静地、长久地看着他。'},
 {s:'L',x:'「……」'},
 {s:'L',x:'「沉默。有意思。这是最不会留下把柄的应对——也是最不像普通人的应对。」'},
 {s:'L',x:'「谢谢你，夜神同学。你刚刚给了我，最多的情报。」'},

],next:'c3_after_meet'},

c3_confess:{bg:'street',chara:'L',bgm:'l',t:[
 {s:'',x:'时间，好像停了半秒。'},
 {s:'夜神月',x:'「……我就是基拉。」'},
 {s:'',x:'你说得很轻，轻到只有你们两个人能听见。周围的新生笑着走过，谁也没有回头。'},
 {s:'',x:'L 端着咖啡的手，停在半空。第七颗方糖，还捏在他指间。'},
 {s:'L',x:'「……」'},
 {s:'L',x:'「（把方糖放进杯子里）……夜神同学，你知道我此刻在想什么吗？」'},
 {s:'L',x:'「我在想：这是我人生中，第一次<span class="l">完全没有预测到</span>的回答。」'},
],next:'c3_confess2'},
c3_confess2:{bg:'street',chara:'L',bgm:'l',t:[
 {s:'夜神月',x:'（赌博。但这是唯一能打乱他节奏的方式。）'},
 {s:'夜神月',x:'「我承认了。然后呢？逮捕我？你有证据吗，L？」'},
 {s:'夜神月',x:'「一个大学生在入学典礼后，对一个自称 L 的怪人说了句『我是基拉』——这在法庭上，连玩笑都算不上。」'},
 {s:'L',x:'「……确实。这段对话没有录音，没有证人。你甚至可以说是我幻听。」'},
 {s:'L',x:'「所以这不是自首。这是——<span class="l">挑衅</span>。」'},
 {s:'夜神月',x:'「随你怎么理解。」'},
 {s:'夜神月',x:'（我要的就是这个：让他知道，却什么都做不了。让「我知道你知道」这件事，成为压在他心上的石头。）'},
 {s:'夜神月',x:'（从这一刻起，我们不再是猎人与猎物。我们是——同一张牌桌上，摊开底牌的两个赌徒。）'},
],next:'c3_confess3',stats:{sus:25,heart:-6}},
c3_confess3:{bg:'hq',day:36,chara:'L',bgm:'l',t:[
 {s:'',x:'第二天。L 做了一个所有人都无法理解的决定。'},
 {s:'L',x:'「从今天起，我要和夜神月同学，<span class="l">住在一起</span>。」'},
 {s:'',x:'（搜查本部一片哗然。你的父亲当场站了起来。）'},
 {s:'夜神父',x:'「龙崎！你在说什么？月是我的儿子！」'},
 {s:'L',x:'「正因为如此。夜神局长，如果令郎清白，二十四小时的同居监视，是最快的洗清方式。」'},
 {s:'L',x:'「而如果他是基拉——」'},
 {s:'L',x:'「那我这条命，就交给他慢慢拿。」'},
 {s:'夜神月',x:'（这个疯子……）\n（他在用自己的性命，赌一场没有证据的游戏。）'},
],next:'c3_live'},
c3_live:{bg:'hq',day:50,chara:'L',bgm:'l',t:[
 {s:'',x:'两周。同一个房间，两张床，一副手铐还没戴上——但那种气氛，比手铐更紧。'},
 {s:'',x:'你们一起吃饭、一起打网球、一起分析案情。你们像最好的朋友，也像最耐心的死敌。'},
 {s:'L',x:'（把草莓从蛋糕上叼下来）「夜神同学，你昨晚三点还醒着。」'},
 {s:'夜神月',x:'「你也是。」'},
 {s:'L',x:'「我在想，如果你是基拉，你现在最需要的是什么？」'},
 {s:'L',x:'「答案是：我的名字。你等了两周，还没有下手——说明你确实不知道。」'},
 {s:'L',x:'「这就是我敢和你同住的原因。你越是安分，越证明你是基拉。」'},
 {s:'夜神月',x:'（……这个逻辑闭环，简直无解。）\n（不管我做什么，在他眼里都是证据。）'},
],choices:[
 {label:'继续忍耐，等他露出破绽',hint:'耐心是神的美德',next:'c3_patient'},
 {label:'试探他的过去：「你为什么当侦探？」',hint:'人心是唯一的突破口',next:'c3_probe'},
 {label:'反向利用：让他亲眼看到基拉在我被监视时行动',hint:'洗清嫌疑的经典手法',next:'c3_alibi',dark:true},
]},
c3_probe:{bg:'hq',chara:'L',bgm:'l',t:[
 {s:'夜神月',x:'「龙崎，我一直想问——你为什么当侦探？」'},
 {s:'L',x:'「……」'},
 {s:'L',x:'「因为我擅长。就像你擅长考第一名一样。」'},
 {s:'L',x:'「而且，这是唯一一件……能让我确认『自己在做正确的事』的工作。」'},
 {s:'L',x:'「夜神同学。你相信正义吗？」'},
 {s:'夜神月',x:'「当然。我从小就相信。」'},
 {s:'L',x:'「我也是。所以我一直很好奇——」'},
 {s:'L',x:'「<span class="l">基拉，一定也认为自己是正义的吧。</span>」'},
 {s:'',x:'房间里安静了很久。窗外，东京的灯一盏盏亮起来。'},
 {s:'夜神月',x:'（……这个男人，是第一个真正理解我的人。）\n（也正因为如此，他必须死。）'},
],next:'c3_shiori_intro',stats:{heart:4}},
c3_patient:{bg:'hq',chara:'L',bgm:'l',t:[
 {s:'',x:'你选择了绝对的安分。两周变成一个月。基拉停止了杀人，L 的怀疑却丝毫未减。'},
 {s:'L',x:'「基拉停手了。恰好在我盯着你的时候。」'},
 {s:'夜神月',x:'（……我知道你会这么说。）'},
 {s:'夜神月',x:'（但耐心，是我最不缺的东西。L，我可以陪你耗到你自己怀疑自己。）'},
],next:'c3_shiori_intro',stats:{sus:-4}},
c3_alibi:{bg:'hq',chara:'',bgm:'write',t:[
 {s:'',x:'你早就准备好了后手：一份提前写好、设定了死亡时间的名单，藏在你无法触及、却仍会自动生效的地方。'},
 {s:'',x:'当天下午，在 L 亲眼盯着你的时候——三名罪犯，如期心脏麻痹。'},
 {s:'夜神月',x:'（不在场证明。完美的。）'},
 {s:'L',x:'「……在我的监视下，基拉行动了。」'},
 {s:'L',x:'「按常理，这能洗清你。但夜神同学——」'},
 {s:'L',x:'「<span class="l">如果凶手能预先设定死亡时间呢？</span>」'},
 {s:'夜神月',x:'（——他连这个都想到了？！）'},
 {s:'L',x:'「你的嫌疑，从 5% 上升到了 8%。」'},
],next:'c3_shiori_intro',stats:{sus:6,heart:-6}},
c3_after_meet:{bg:'room',day:37,chara:'ryuk',bgm:'menu',t:[
 {s:'',x:'回到家。你把门反锁，靠在门上，长长地吐出一口气。'},
 {s:'琉克',x:'「咔咔咔——月，你刚才吓得不轻吧？」'},
 {s:'夜神月',x:'「……闭嘴。」'},
 {s:'夜神月',x:'（L。真名不明。样貌已知。就住在这座城市里，和我上同一所大学。）'},
 {s:'夜神月',x:'（只要拿到名字，四十秒。只要四十秒。）'},
 {s:'夜神月',x:'（但他敢现身，就说明他早有准备。真名一定是最高机密。）'},
 {s:'琉克',x:'「死神之眼，随时都能交易哦。半条命，换所有人的名字。」'},
],choices:[
 {label:'「不需要。我说过，用头脑。」',hint:'坚持',next:'c3_shiori_intro',stats:{heart:2}},
 {label:'「……这次，我认真考虑一下。」',hint:'动摇了',next:'c3_eyes_temp',stats:{heart:-6}},
]},
c3_eyes_temp:{bg:'room',chara:'ryuk',t:[
 {s:'琉克',x:'「哦？终于动心了？」'},
 {s:'夜神月',x:'（……不。）\n（我的寿命，是新世界的资本。为了一个 L，赔上一半的统治时间？'},
 {s:'夜神月',x:'（不划算。而且，一旦我用眼睛杀了他，他背后的人会立刻知道基拉能"看见"名字——那才是真正的破绽。）'},
 {s:'夜神月',x:'「……算了。当我没说。」'},
 {s:'琉克',x:'「啧。差一点。」'},
],next:'c3_shiori_intro'},

/* ---------- 原创角色：诗织 ---------- */
c3_shiori_intro:{bg:'class',day:58,chara:'shiori_think',bgm:'menu',t:[
 {s:'',x:'大学。刑法学的阶梯教室。'},
 {s:'',x:'你的邻座是个总把笔记本折得整整齐齐的女生——<span class="em">高城诗织</span>，法学部一年级，梦想是当检察官。'},
 {s:'诗织',x:'「夜神同学，这里的判例……你怎么看？」'},
 {s:'诗织',x:'「我觉得法律有时候好慢啊。等判决下来，受害者的家属都已经等了十年。」'},
 {s:'夜神月',x:'（……又一个对现行法律感到无力的人。）\n（这个国家，到处都是这样的人。他们就是我要拯救的对象。）'},
 {s:'诗织',x:'「所以我在想……基拉做的事，虽然是犯罪，可是——」'},
 {s:'诗织',x:'「（小声）可是我妈妈说，自从基拉出现，她晚上敢一个人走夜路了。」'},
],choices:[
 {label:'「基拉只是杀人犯。」',hint:'撇清关系，保护她',next:'c3_shiori_push'},
 {label:'「你觉得……基拉是正义的吗？」',hint:'试探她',next:'c3_shiori_pull'},
 {label:'转移话题，不谈基拉',hint:'不让她靠近这个话题',next:'c3_shiori_avoid'},
]},
c3_shiori_avoid:{bg:'class',chara:'shiori',t:[
 {s:'夜神月',x:'「……判例的部分，我觉得应该从量刑标准来看。」'},
 {s:'',x:'你把话题拉回了学术。诗织愣了一下，随即笑了。'},
 {s:'诗织',x:'「夜神同学好认真啊。不过也是，聊这个太危险了，我爸爸说现在讨论基拉的人都要被警察记名字呢。」'},
 {s:'夜神月',x:'（……让她离这一切远一点。这是对她最好的。）'},
 {s:'',x:'但你没有意识到：在这个校园里，「离夜神月近」这件事本身，就已经是危险。'},
],next:'c3_naomi'},
c3_shiori_push:{bg:'class',chara:'shiori',t:[
 {s:'夜神月',x:'「基拉只是杀人犯。不管理由多么冠冕堂皇，用私刑代替法律，只会让世界变成更大的地狱。」'},
 {s:'',x:'诗织眨了眨眼，然后笑了。'},
 {s:'诗织',x:'「……果然，夜神同学是这么想的。太好了。」'},
 {s:'诗织',x:'「其实我也觉得基拉不对。可是每次看到新闻里那些恶心的罪犯逍遥法外，我又忍不住会想『死了也好』——然后我就讨厌这样的自己。」'},
 {s:'诗织',x:'「所以听到你这么说，我安心多了。你是我认识的人里，最正直的那个。」'},
 {s:'夜神月',x:'（……最正直的那个。）'},
 {s:'',x:'她说这话的时候，眼睛是亮的。\n而你，第一次在一个人面前，觉得自己的谎言有点重。'},
],next:'c3_naomi',stats:{heart:3}},
c3_shiori_pull:{bg:'class',chara:'shiori_uneasy',t:[
 {s:'夜神月',x:'「诗织，你觉得……基拉是正义的吗？」'},
 {s:'诗织',x:'「诶？」'},
 {s:'诗织',x:'「唔……我不知道。杀人肯定是错的。可是——如果这个世界的法律，本来就抓不到那些最坏的人呢？」'},
 {s:'诗织',x:'「如果有一个人，能替所有受害者做那件『法律做不到的事』……那他到底是恶魔，还是——」'},
 {s:'',x:'她说到一半，自己摇了摇头。'},
 {s:'诗织',x:'「抱歉，我在说什么呀。这种话被听到会被当成基拉支持者的。」'},
 {s:'夜神月',x:'（……她动摇了。就像这个国家的每一个人一样。）\n（只要再推一把，她就会成为信徒。）'},
 {s:'夜神月',x:'（可是——为什么，我并不想推这一把？）'},
],next:'c3_naomi',stats:{sup:2,heart:-2}},

/* ---------- 南空直美 ---------- */
c3_naomi:{bg:'street',day:62,chara:'naomi',bgm:'l',t:[
 {s:'',x:'警视厅门口。你替父亲送文件出来，一个穿黑色大衣的女人叫住了你。'},
 {s:'',x:'她的眼睛通红，但站姿笔直得像把刀。'},
 {s:'南空直美',x:'「你是夜神局长的儿子？我叫……<span class="l">时户成美</span>。我的未婚夫，是死在日本的 FBI 探员之一。」'},
 {s:'夜神月',x:'（假名。她在用假名。职业习惯——她也是 FBI 出身。）'},
 {s:'南空直美',x:'「我想请你转告 L 一件事。关于基拉能力的推测。我发现了一个——只有杀人犯自己才会知道的破绽。」'},
 {s:'夜神月',x:'（——！）\n（破绽？她发现了什么？）'},
 {s:'夜神月',x:'（无论如何，绝不能让她见到 L。必须先套出她的真名。）'},
],next:'c3_naomi2'},
c3_naomi2:{bg:'street',chara:'naomi',bgm:'l',timed:1,timeout:{sus:14},timeoutNext:'c3_naomi_info',t:[
 {s:'夜神月',x:'「我可以带您去见 L。不过为了确认身份，请您在这份访客登记上，写下真实姓名。」'},
 {s:'',x:'你递出笔和登记板。这是最经典、也最致命的一招。'},
 {s:'南空直美',x:'「……」'},
 {s:'',x:'她盯着那张纸，看了很久。手指在笔上收紧又松开。'},
 {s:'南空直美',x:'「……抱歉。我不能写。」'},
 {s:'夜神月',x:'（——！）'},
 {s:'南空直美',x:'「我的未婚夫死前告诉过我：基拉，只需要名字和脸。」'},
 {s:'南空直美',x:'「而你，从刚才开始，就一直在盯着我的脸看。」'},
],choices:[
 {label:'继续诱导：「不写名字，L 不会见你」',hint:'施压，逼她就范',next:'c3_naomi_push',dark:true},

]},
c3_naomi_push:{bg:'street',chara:'naomi_grief',bgm:'write',t:[
 {s:'夜神月',x:'「时户女士，我理解您的警惕。但没有身份确认，L 不会见任何人。」'},
 {s:'夜神月',x:'「而且——如果您真的握有关键情报，越晚交出去，就会有越多人因为基拉而死。」'},
 {s:'',x:'（这是她无法反驳的逻辑。作为一个前执法者，她的责任感就是最大的弱点。）'},
 {s:'',x:'她的手，终于落在了纸上。\n笔尖划过的那一刻，你看清了那三个字：<span class="bad">南空直美</span>。'},
 {s:'夜神月',x:'（拿到了。）'},
],next:'c3_naomi_dead'},
c3_naomi_dead:{bg:'night',chara:'ryuk',bgm:'write',write:'南空直美',t:[
 {s:'',x:'第二天的新闻里没有她。她只是……不见了。一个用假名生活、没有亲属在日本的女人，消失得无声无息。'},
 {s:'琉克',x:'「呐，月。她昨天说的『破绽』，你不好奇吗？」'},
 {s:'夜神月',x:'「（顿了一下）……不好奇。死人不会说话。」'},
 {s:'',x:'但那天夜里，你反复想着她的最后一句话。\n她说：「我的未婚夫死前告诉过我。」\n她说得那样平静。'},
 {s:'夜神月',x:'（她只是想为爱人报仇的女人。而我，用她的责任感做诱饵，杀了她。）'},
 {s:'夜神月',x:'（……这就是神的道路。我早就知道会是这样。）'},
 {s:'',x:'你这样告诉自己，一直到天亮。'},
],next:'c3_end',stats:{sus:-6,heart:-16,sup:2}},
c3_naomi_info:{bg:'street',chara:'naomi_grief',bgm:'l',t:[
 {s:'夜神月',x:'「……我明白了。那么请您把情报告诉我，我一定原封不动地转告 L。」'},
 {s:'南空直美',x:'「不行。这件事，我只能当面对 L 说。」'},
 {s:'',x:'她转身离开了。而你站在原地，第一次感到失控。'},
 {s:'夜神月',x:'（她掌握着什么？「只有杀人犯自己才知道的破绽」——是死亡时间的操控？还是笔记的规则？）'},
 {s:'夜神月',x:'（我必须在她见到 L 之前找到她。可我连她的真名都没有。）'},
 {s:'',x:'三天后，你在电视上看到 L 的搜查本部召开了一次紧急会议。\n<span class="l">而你没有被通知。</span>'},
],next:'c3_end',stats:{sus:12,heart:-4}},
c3_naomi_save:{bg:'street',chara:'naomi_grief',bgm:'menu',t:[
 {s:'',x:'你张了张嘴。'},
 {s:'',x:'你本该套出她的名字。这是最优解，你的大脑在零点几秒内就算清了所有步骤。'},
 {s:'',x:'但你听见自己的声音说：'},
 {s:'夜神月',x:'「……时户女士。听我一句劝：立刻离开东京，越远越好。」'},
 {s:'南空直美',x:'「……什么？」'},
 {s:'夜神月',x:'「你的未婚夫说得对——基拉只需要名字和脸。而你现在，站在警视厅门口，脸暴露在所有人的视线里。」'},
 {s:'夜神月',x:'「你已经做得够多了。剩下的，交给活着的人。」'},
 {s:'',x:'她盯着你看了很久。那双通红的眼睛里，有什么东西松动了。'},
 {s:'南空直美',x:'「……你是个好人，夜神同学。谢谢你。」'},
 {s:'',x:'她走了。当晚，一班飞往洛杉矶的航班载走了一个用假名登机的女人。'},
],next:'c3_naomi_save2'},
c3_naomi_save2:{bg:'night',chara:'ryuk',bgm:'menu',t:[
 {s:'琉克',x:'「月。我不明白。」'},
 {s:'琉克',x:'「她随时可能想起什么、随时可能回来指证你。你放走了一颗定时炸弹。」'},
 {s:'琉克',x:'「为什么？」'},
 {s:'夜神月',x:'「……」'},
 {s:'夜神月',x:'（为什么？）'},
 {s:'夜神月',x:'（因为她让我想起了什么。想起了……我最初拿起笔的那个晚上。）'},
 {s:'夜神月',x:'（那时候我想保护的，就是这样的人。为爱的人流泪、还愿意为陌生人的安全去冒险的人。）'},
 {s:'夜神月',x:'（如果连这样的人我都要杀——那我到底在创造什么样的新世界？）'},
 {s:'夜神月',x:'「琉克。这不是仁慈。」'},
 {s:'夜神月',x:'「这是……我给自己留的最后一条底线。」'},
 {s:'琉克',x:'「……哈。人类啊。」'},
],next:'c3_end',stats:{sus:2,heart:16,sup:-2}},

c4_1:{bg:'tv',day:70,chara:'',bgm:'l',t:[
 {s:'',x:'第四章 · 第二基拉'},
 {s:'',x:'一切都变了。'},
 {s:'',x:'某天下午，全国的电视台同时收到一盘录像带。画面上只有一行扭曲的手写字：'},
 {s:'',x:'<span class="bad">「我是基拉。我要向真正的基拉传达我的敬意。」</span>'},
 {s:'',x:'紧接着，两名新闻主播在直播中猝死——因为他们批评过基拉。'},
 {s:'夜神月',x:'（——什么？）'},
 {s:'夜神月',x:'（不是我。我没有杀过任何一个『批评者』。）\n（还有另一本笔记？还有另一个……持有者？）'},
 {s:'琉克',x:'「哦？看来是另一位死神，也把笔记掉到人间了呢。咔咔咔。」'},
 {s:'夜神月',x:'「琉克，你早就知道？」'},

/* ================= 启动 ================= */
/* 难度选择 UI */
S.diff=parseInt(localStorage.getItem('yagami_diff')||'3');
function buildDiff(){
  const box=$('diffPick');box.innerHTML='';
  [1,3,5].forEach(n=>{
    const b=document.createElement('button');
    const on=S.diff===n;
    b.textContent='★'.repeat(n);
    b.style.cssText='appearance:none;border:1px solid '+(on?'#c9a84c':'#2a2336')+';background:'+(on?'rgba(56,44,18,.8)':'rgba(18,13,24,.8)')+';color:'+(on?'#c9a84c':'#6b6478')+';font-size:13px;letter-spacing:.1em;padding:9px 16px;border-radius:2px;cursor:pointer';
    b.onclick=()=>{S.diff=n;localStorage.setItem('yagami_diff',n);buildDiff();};
    box.appendChild(b);
  });
  $('diffTag').textContent=DIFF[S.diff].name+' — '+DIFF[S.diff].tag;
}
buildDiff();
if(localStorage.getItem('yagami_save'))$('loadBtn').style.display='';
if(unlocked().length>1)$('chapBtn').style.display='';
$('startBtn').onclick=()=>{localStorage.removeItem('yagami_save');
  const _d=S.diff;Object.assign(S,{day:1,sus:0,sup:0,heart:100,node:'d1_1',flags:{},chapter:1,diff:_d});
  $('titleScreen').classList.remove('on');bgm('menu');setDay(1);setStats({});go('d1_1');};
/* 章节选择 */
function buildChapList(){
  const u=unlocked(),box=$('chapList');box.innerHTML='';
  CHAPTERS.forEach(c=>{
    const ok=u.includes(c.id);
    const b=document.createElement('button');
    b.className='ch'+(ok?'':' dark');
    b.style.opacity=ok?'1':'.4';
    b.innerHTML=c.name+(ok?'':'<small>尚未解锁</small>');
    if(ok)b.onclick=()=>{
      // 按章节起点给一个合理的初始数值
      const preset={1:{sus:0,sup:0,heart:100},2:{sus:12,sup:16,heart:88},
                    3:{sus:26,sup:34,heart:76},4:{sus:38,sup:52,heart:64},
                    5:{sus:56,sup:64,heart:52}}[c.id];
      Object.assign(S,{day:c.day,node:c.node,flags:{},chapter:c.id},preset);
      $('sSus').querySelector('b').textContent=dif().hideSus?'？？':(S.sus+'%');
      $('sSup').querySelector('b').textContent=S.sup+'%';
      $('sHeart').querySelector('b').textContent=S.heart;
      $('chapScreen').classList.remove('on');$('titleScreen').classList.remove('on');$('endTitle').classList.remove('on');
      bgm('menu');setDay(c.day);go(c.node);
    };
    box.appendChild(b);
  });
}
$('chapBtn').onclick=()=>{buildChapList();$('chapScreen').classList.add('on');};
$('endChapBtn').onclick=()=>{buildChapList();$('chapScreen').classList.add('on');};
$('chapBack').onclick=()=>{$('chapScreen').classList.remove('on');};
/* 游戏内菜单 */
$('menuBtn').onclick=()=>{$('menuScreen').classList.add('on');};
$('mResume').onclick=()=>{$('menuScreen').classList.remove('on');};
$('mChap').onclick=()=>{buildChapList();$('menuScreen').classList.remove('on');$('chapScreen').classList.add('on');};
$('mTitle').onclick=()=>{location.reload();};
$('loadBtn').onclick=()=>{if(loadSave()){$('titleScreen').classList.remove('on');bgm('menu');
  setDay(S.day);setStats({});go(S.node);}};
</script>
