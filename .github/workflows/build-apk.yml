name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'agent/**'
    paths:
      - index.html
      - sw.js
      - manifest.webmanifest
      - icons/**
      - assets/**
      - package.json
      - package-lock.json
      - capacitor.config.json
      - scripts/**
      - .github/workflows/build-apk.yml
  pull_request:
    branches:
      - main
    paths:
      - index.html
      - sw.js
      - manifest.webmanifest
      - icons/**
      - assets/**
      - package.json
      - package-lock.json
      - capacitor.config.json
      - scripts/**
      - .github/workflows/build-apk.yml

permissions:
  contents: read

jobs:
  build:
    name: Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci

      - name: Bundle offline web assets
        run: npm run build:web

      - name: Create Android project
        run: npx cap add android

      - name: Sync and configure Android
        run: |
          npx cap sync android
          npm run android:configure
          chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Prepare artifact
        run: |
          mkdir -p output
          cp android/app/build/outputs/apk/debug/app-debug.apk output/di13jie-debug.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: di13jie-debug-apk
          path: output/di13jie-debug.apk
          if-no-files-found: error
          retention-days: 30
